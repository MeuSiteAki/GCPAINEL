<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GC BURGUER — PAINEL</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root {
            --gold: #e8a930;
            --gold-dim: rgba(232, 169, 48, 0.15);
            --dark: #080808;
            --card: #111111;
            --card2: #161616;
            --border: rgba(255, 255, 255, 0.07);
            --green: #2ecc71;
            --red: #e74c3c;
            --orange: #e67e22;
        }

        * {
            box-sizing: border-box;
        }

        body {
            background: var(--dark);
            background-image: radial-gradient(ellipse 80% 50% at 50% -20%, rgba(232, 169, 48, 0.07), transparent);
            color: white;
            font-family: 'Outfit', sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
        }

        .topbar {
            background: rgba(10, 10, 10, 0.97);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .topbar-inner {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            align-items: center;
        }

        .brand {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.3rem;
            letter-spacing: 3px;
            color: var(--gold);
            padding: 12px 16px;
            border-right: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
            white-space: nowrap;
        }

        .tabs-menu {
            display: flex;
            flex: 1;
            align-items: center;
            overflow: visible;
            position: relative;
        }

        .tab-btn {
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.4);
            padding: 16px 14px;
            cursor: pointer;
            font-weight: 600;
            white-space: nowrap;
            font-size: 0.78rem;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            font-family: 'Outfit', sans-serif;
            transition: 0.2s;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .tab-btn::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 14px;
            right: 14px;
            height: 2px;
            background: var(--gold);
            transform: scaleX(0);
            transition: transform 0.2s;
        }

        .tab-btn.active::after {
            transform: scaleX(1);
        }

        .tab-btn:hover {
            color: rgba(255, 255, 255, 0.75);
            background: rgba(255, 255, 255, 0.03);
        }

        .tab-btn.active {
            color: var(--gold);
            background: rgba(232, 169, 48, 0.07);
        }

        .tab-btn i {
            font-size: 0.85rem;
        }

        .btn-mais {
            display: none !important;
        }

        .menu-extras {
            display: flex;
        }

        @media (max-width: 700px) {
            .topbar-inner {
                flex-wrap: wrap;
            }

            .brand {
                border-right: none;
                border-bottom: 1px solid var(--border);
                width: 100%;
                padding: 10px 14px;
                font-size: 1.1rem;
            }

            .tabs-menu {
                width: 100%;
                gap: 4px;
                padding: 6px 8px;
                flex-wrap: nowrap;
            }

            .tab-btn:not(.btn-mais) {
                flex: 1;
                padding: 10px 6px;
                font-size: 0.68rem;
                letter-spacing: 0.5px;
            }

            .tab-btn::after {
                display: none;
            }

            .tab-btn.active {
                border-radius: 8px;
                background: rgba(232, 169, 48, 0.15);
            }

            .btn-mais {
                display: flex !important;
                flex: 0 0 40px;
                align-items: center;
                justify-content: center;
                background: transparent !important;
                border: 1px solid rgba(255, 215, 0, 0.3) !important;
                color: var(--gold) !important;
                height: 38px;
                border-radius: 8px;
                cursor: pointer;
                padding: 0 10px;
                font-size: 0.9rem;
            }

            .menu-extras {
                display: none;
                flex-direction: column;
                position: absolute;
                top: calc(100% + 4px);
                right: 8px;
                width: 200px;
                background: #111;
                border: 1px solid var(--border);
                border-radius: 12px;
                z-index: 9999;
                box-shadow: 0 10px 30px rgba(0, 0, 0, 0.9);
                overflow: hidden;
            }

            .menu-extras.show {
                display: flex;
                animation: fadeIn 0.18s ease-out;
            }

            .menu-extras .tab-btn {
                width: 100%;
                justify-content: flex-start;
                padding: 14px 16px;
                border-bottom: 1px solid rgba(255, 255, 255, 0.05);
                border-radius: 0;
                font-size: 0.82rem;
            }

            .menu-extras .tab-btn::after {
                display: none;
            }

            .menu-extras .tab-btn:last-child {
                border-bottom: none;
            }
        }

        @media (min-width: 701px) and (max-width: 960px) {
            .tab-btn {
                padding: 14px 10px;
                font-size: 0.72rem;
                letter-spacing: 1px;
            }

            .tab-btn::after {
                left: 10px;
                right: 10px;
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-8px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .content-section {
            display: none;
            max-width: 1200px;
            margin: 0 auto;
            padding: 16px 12px;
        }

        .content-section.active {
            display: block;
        }

        .mesas-header {
            margin-bottom: 18px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
        }

        .mesas-header h2 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.8rem;
            letter-spacing: 3px;
            color: var(--gold);
            margin: 0;
        }

        .mesas-stats {
            display: flex;
            gap: 10px;
        }

        .stat-pill {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 5px 14px;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .stat-pill.ocp {
            border-color: rgba(230, 126, 34, 0.4);
            color: var(--orange);
            background: rgba(230, 126, 34, 0.07);
        }

        .stat-pill.liv {
            border-color: rgba(46, 204, 113, 0.4);
            color: var(--green);
            background: rgba(46, 204, 113, 0.07);
        }

        .mesas-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 14px;
        }

        @media(max-width: 520px) {
            .mesas-grid {
                grid-template-columns: 1fr;
            }
        }

        .mesa-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 18px 16px;
            cursor: pointer;
            transition: all 0.22s;
            position: relative;
            overflow: hidden;
        }

        .mesa-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: var(--border);
            transition: 0.22s;
        }

        .mesa-card:hover {
            transform: translateY(-2px);
            border-color: rgba(232, 169, 48, 0.3);
        }

        .mesa-card:hover::before {
            background: var(--gold);
        }

        .mesa-card.ocupada {
            border-color: rgba(230, 126, 34, 0.3);
            background: linear-gradient(135deg, #141008, #0f0f0f);
        }

        .mesa-card.ocupada::before {
            background: var(--orange);
        }

        .mesa-card.livre::before {
            background: var(--green);
        }

        .mesa-card-top {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            margin-bottom: 12px;
        }

        .mesa-num {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 2rem;
            letter-spacing: 2px;
            line-height: 1;
            color: white;
        }

        .mesa-status-badge {
            font-size: 0.65rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            padding: 3px 9px;
            border-radius: 20px;
        }

        .badge-livre {
            background: rgba(46, 204, 113, 0.12);
            color: var(--green);
            border: 1px solid rgba(46, 204, 113, 0.3);
        }

        .badge-ocupada {
            background: rgba(230, 126, 34, 0.12);
            color: var(--orange);
            border: 1px solid rgba(230, 126, 34, 0.3);
        }

        .mesa-garcom-row {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 12px;
        }

        .mesa-garcom-row span {
            color: var(--gold);
            font-weight: 600;
        }

        .mesa-itens-lista {
            background: rgba(0, 0, 0, 0.35);
            border-radius: 10px;
            padding: 10px 12px;
            margin-bottom: 12px;
            border: 1px solid var(--border);
        }

        .mesa-item-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.78rem;
            padding: 3px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
        }

        .mesa-item-row:last-child {
            border-bottom: none;
        }

        .mesa-item-nome {
            color: rgba(255, 255, 255, 0.75);
        }

        .mesa-item-preco {
            color: var(--gold);
            font-weight: 600;
            white-space: nowrap;
            margin-left: 8px;
        }

        .mesa-total-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
        }

        .mesa-total-label {
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.4);
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .mesa-total-val {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--green);
        }

        .mesa-actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .mesa-act-btn {
            padding: 10px 6px;
            border: none;
            border-radius: 10px;
            font-size: 0.75rem;
            font-weight: 700;
            cursor: pointer;
            letter-spacing: 0.5px;
            font-family: 'Outfit', sans-serif;
            transition: 0.18s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }

        .mesa-act-btn.btn-pedido {
            background: rgba(232, 169, 48, 0.15);
            color: var(--gold);
            border: 1px solid rgba(232, 169, 48, 0.35);
        }

        .mesa-act-btn.btn-pedido:hover {
            background: rgba(232, 169, 48, 0.28);
        }

        .mesa-act-btn.btn-cozinha {
            background: rgba(230, 126, 34, 0.15);
            color: var(--orange);
            border: 1px solid rgba(230, 126, 34, 0.35);
        }

        .mesa-act-btn.btn-cozinha:hover {
            background: rgba(230, 126, 34, 0.28);
        }

        .mesa-act-btn.btn-cozinha-ok {
            background: rgba(46, 204, 113, 0.08);
            color: rgba(46, 204, 113, 0.5);
            border: 1px solid rgba(46, 204, 113, 0.2);
            cursor: default;
        }

        .mesa-act-btn.btn-fechar {
            background: rgba(46, 204, 113, 0.15);
            color: var(--green);
            border: 1px solid rgba(46, 204, 113, 0.35);
        }

        .mesa-act-btn.btn-fechar:hover {
            background: rgba(46, 204, 113, 0.28);
        }

        .mesa-livre-inner {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 16px 0;
            gap: 8px;
        }

        .mesa-livre-icon {
            font-size: 2.2rem;
            opacity: 0.35;
        }

        .mesa-livre-text {
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.3);
            font-weight: 500;
        }

        .btn-abrir-mesa {
            width: 100%;
            padding: 12px;
            background: rgba(46, 204, 113, 0.1);
            color: var(--green);
            border: 1px solid rgba(46, 204, 113, 0.3);
            border-radius: 10px;
            cursor: pointer;
            font-weight: 700;
            font-size: 0.8rem;
            font-family: 'Outfit', sans-serif;
            letter-spacing: 1px;
            transition: 0.18s;
        }

        .btn-abrir-mesa:hover {
            background: rgba(46, 204, 113, 0.22);
        }

        .pedidos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 16px;
        }

        @media(max-width: 640px) {
            .pedidos-grid {
                grid-template-columns: 1fr;
            }
        }

        .pedido-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 15px;
            padding: 16px;
            position: relative;
            border-top: 3px solid var(--gold);
            transition: all 0.3s;
        }

        .pedido-card.mesa-card-closed {
            border-top-color: var(--green);
        }

        .pedido-card.saiu-entrega {
            border-color: rgba(52, 152, 219, 0.6);
            border-top-color: #3498db;
            background: linear-gradient(135deg, #050d14, #0a0a0a);
            box-shadow: 0 0 18px rgba(52, 152, 219, 0.15);
        }

        .badge-saiu {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            background: rgba(52, 152, 219, 0.15);
            color: #3498db;
            border: 1px solid rgba(52, 152, 219, 0.4);
            border-radius: 20px;
            font-size: 0.68rem;
            font-weight: 700;
            letter-spacing: 1px;
            padding: 3px 10px;
            margin-top: 8px;
        }

        .btn-del {
            position: absolute;
            top: 10px;
            right: 10px;
            background: none;
            border: none;
            color: #ff4d4d;
            font-size: 20px;
            cursor: pointer;
            opacity: 0.55;
            line-height: 1;
            transition: opacity 0.18s;
        }

        .btn-del:hover {
            opacity: 1;
        }

        .lista-itens-card {
            background: rgba(0, 0, 0, 0.3);
            padding: 10px;
            border-radius: 8px;
            margin: 8px 0;
            font-size: 0.88rem;
        }

        .item-linha {
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding: 4px 0;
            display: flex;
            justify-content: space-between;
        }

        .status-actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 14px;
        }

        .btn-wa {
            border: none;
            padding: 10px;
            border-radius: 8px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.78rem;
            font-family: 'Outfit', sans-serif;
            transition: 0.2s;
        }

        .bg-blue {
            background: #2980b9;
        }

        .bg-blue:hover {
            background: #3498db;
        }

        .bg-green {
            background: #27ae60;
        }

        .bg-green:hover {
            background: #2ecc71;
        }

        .btn-wa-ativo {
            background: linear-gradient(135deg, #1a4a72, #1e6091) !important;
            border: 1px solid #3498db !important;
        }

        .tag {
            display: inline-block;
            border-radius: 6px;
            font-size: 0.68rem;
            padding: 2px 9px;
            font-weight: 700;
            margin-bottom: 5px;
            letter-spacing: 1px;
        }

        .tag-delivery {
            background: rgba(232, 169, 48, 0.15);
            color: var(--gold);
            border: 1px solid rgba(232, 169, 48, 0.4);
        }

        .tag-mesa {
            background: rgba(46, 204, 113, 0.12);
            color: var(--green);
            border: 1px solid rgba(46, 204, 113, 0.35);
        }

        .section-label {
            color: rgba(255, 255, 255, 0.3);
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin: 24px 0 12px;
            grid-column: 1 / -1;
            padding-left: 10px;
            border-left: 3px solid var(--gold);
        }

        .btn-ver-mais {
            grid-column: 1 / -1;
            background: rgba(232, 169, 48, 0.08);
            color: var(--gold);
            border: 1px solid rgba(232, 169, 48, 0.25);
            border-radius: 10px;
            padding: 12px 20px;
            cursor: pointer;
            font-weight: 700;
            font-size: 0.8rem;
            font-family: 'Outfit', sans-serif;
            letter-spacing: 1px;
            transition: 0.18s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 4px;
        }

        .btn-ver-mais:hover {
            background: rgba(232, 169, 48, 0.18);
        }

        .obs-badge {
            display: flex;
            align-items: flex-start;
            gap: 6px;
            background: rgba(232, 169, 48, 0.06);
            border: 1px solid rgba(232, 169, 48, 0.18);
            border-radius: 8px;
            padding: 7px 10px;
            margin: 8px 0;
            font-size: 0.77rem;
            color: rgba(255, 255, 255, 0.6);
            line-height: 1.4;
        }

        .obs-badge i {
            color: var(--gold);
            flex-shrink: 0;
            margin-top: 1px;
        }

        .taxa-entrega-row {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.8rem;
            color: #3498db;
            margin-bottom: 6px;
            font-weight: 600;
        }

        .estoque-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
        }

        @media(min-width: 500px) {
            .estoque-grid {
                grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            }
        }

        .item-estoque {
            background: var(--card);
            padding: 16px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid var(--border);
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 46px;
            height: 24px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #333;
            transition: .3s;
            border-radius: 34px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 17px;
            width: 17px;
            left: 3.5px;
            bottom: 3.5px;
            background-color: white;
            transition: .3s;
            border-radius: 50%;
        }

        input:checked+.slider {
            background-color: var(--gold);
        }

        input:checked+.slider:before {
            transform: translateX(22px);
        }

        .caixa-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        @media(min-width: 900px) {
            .caixa-container {
                display: grid;
                grid-template-columns: 1fr 340px;
            }
        }

        .caixa-sidebar {
            background: var(--card);
            padding: 25px;
            border-radius: 20px;
            border: 1px solid rgba(232, 169, 48, 0.25);
            text-align: center;
            height: fit-content;
        }

        .valor-total {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 3rem;
            color: var(--gold);
            letter-spacing: 3px;
            margin: 12px 0;
        }

        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.92);
            z-index: 1000;
            justify-content: center;
            align-items: flex-start;
            overflow-y: auto;
            padding: 12px;
        }

        .modal-overlay.open {
            display: flex;
        }

        .modal-box {
            background: #0f0f0f;
            border: 1px solid rgba(232, 169, 48, 0.3);
            border-radius: 20px;
            width: 100%;
            max-width: 540px;
            overflow: hidden;
        }

        .modal-header {
            background: linear-gradient(135deg, #150f00, #1a1400);
            padding: 14px 18px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid rgba(232, 169, 48, 0.15);
        }

        .modal-header h3 {
            margin: 0;
            color: var(--gold);
            font-family: 'Bebas Neue', sans-serif;
            letter-spacing: 2px;
            font-size: 1.2rem;
        }

        .modal-close {
            background: none;
            border: none;
            color: white;
            font-size: 20px;
            cursor: pointer;
            line-height: 1;
            opacity: 0.6;
            transition: 0.15s;
        }

        .modal-close:hover {
            opacity: 1;
        }

        .modal-body {
            padding: 16px 18px;
            max-height: 85vh;
            overflow-y: auto;
        }

        .garcons-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .garcom-btn {
            background: var(--card2);
            border: 1px solid var(--border);
            color: white;
            padding: 16px 8px;
            border-radius: 12px;
            cursor: pointer;
            text-align: center;
            transition: 0.2s;
            font-size: 0.88rem;
            font-weight: 500;
            font-family: 'Outfit', sans-serif;
        }

        .garcom-btn:hover,
        .garcom-btn.sel {

        function normalizarPagamento(pag) {
            if (!pag) return 'Outros';
            const p = pag.trim().toLowerCase();
            if (p.includes('pix')) return 'PIX';
            if (p.includes('dinheiro')) return 'Dinheiro';
            if (p.includes('cartão') || p.includes('cartao') ||
                p.includes('credito') || p.includes('crédito') ||
                p.includes('débito') || p.includes('debito')) return 'Cartão';
            return 'Outros';

        function parsePagamentos(pagStr) {
            if (!pagStr) return [];
            const partes = pagStr.split('+').map(s => s.trim());
            return partes.map(parte => {
                const metodo = normalizarPagamento(parte);
                const match = parte.match(/R\$\s*([\d.,]+)/);
                let valor = 0;
                if (match) {
                    valor = parseFloat(match[1].replace('.', '').replace(',', '.')) || 0;
                }
                return { metodo, valor };
            });

                inputLabel: 'Senha de acesso', inputPlaceholder: 'Digite a senha...',
                confirmButtonText: 'Entrar', confirmButtonColor: '#e8a930',
                background: '#111', color: '#fff',
            });
            if (!senha) return;
            const h = await hashSenha(senha);
            if (h === SENHA_HASH) {
                abasLiberadas[id] = true;
                switchTab(id, el);
                if (id === 'aba-estoque') renderEstoqueConteudo();
                if (id === 'aba-caixa') renderCaixaConteudo();
            } else {
                Swal.fire({ icon: 'error', title: 'Senha incorreta!', background: '#111', color: '#fff', timer: 1500, showConfirmButton: false });

        };

        function renderEstoqueConteudo() {
            document.getElementById('estoque-conteudo').innerHTML = `
        <h2 style="font-family:'Bebas Neue',sans-serif;letter-spacing:3px;color:var(--gold);margin-top:0;">DISPONIBILIDADE</h2>

        <div class="estoque-grid" id="lista-estoque"></div>`;
            iniciarEstoque();
        }

        function renderCaixaConteudo() {
            document.getElementById('caixa-conteudo').innerHTML = `
        <div class="caixa-container">
            <div style="background:var(--card);padding:20px;border-radius:15px;border:1px solid var(--border);">
                <h3 style="font-family:'Bebas Neue',sans-serif;letter-spacing:3px;color:var(--gold);margin-top:0;font-size:1.4rem;">RELATÓRIO DO DIA</h3>
                <div id="caixa-detalhe"></div>
            </div>
            <div class="caixa-sidebar">
                <p style="margin:0;opacity:0.55;letter-spacing:2px;font-size:0.75rem;font-weight:600;">FATURAMENTO TOTAL</p>
                <div class="valor-total" id="c-total">R$ 0,00</div>
                <hr style="opacity:0.08;margin:16px 0;">
                <div id="c-metodos"></div>
                <div style="margin-top:22px;display:flex;flex-direction:column;gap:10px;">
                    <button onclick="gerarPDF()" style="background:#27ae60;color:white;border:none;padding:14px;border-radius:10px;font-weight:700;cursor:pointer;font-family:'Outfit',sans-serif;"><i class="fas fa-file-pdf"></i> BAIXAR RELATÓRIO</button>
                    <button onclick="zerarDia()" style="background:#c0392b;color:white;border:none;padding:14px;border-radius:10px;font-weight:700;cursor:pointer;font-family:'Outfit',sans-serif;"><i class="fas fa-trash"></i> ZERAR DIA</button>
                </div>
            </div>
        </div>`;
            renderCaixa();
        }

        // ── FIREBASE LISTENERS ─────────────────────────────────────────────────────────
        let primeiroSnapPedidos = true;
        onSnapshot(query(collection(db, 'pedidos'), orderBy('data', 'desc')), snap => {
            pedidos = snap.docs.map(d => ({ id: d.id, tipo: 'delivery', ...d.data() }));
            renderPedidos();
            renderCaixa();
            if (primeiroSnapPedidos) { primeiroSnapPedidos = false; return; }
            window.tocarSino?.();
        });

        onSnapshot(collection(db, 'mesas'), snap => {
            mesasAtivas = {};
            snap.docs.forEach(d => { mesasAtivas[d.id] = { id: d.id, ...d.data() }; });
            renderMesasGrid();
            renderPedidos();
        });

        let primeiroSnapMesas = true;
        onSnapshot(query(collection(db, 'mesas_historico'), orderBy('fechadoEm', 'desc')), snap => {
            mesasFech = snap.docs.map(d => ({ id: d.id, tipo: 'mesa', ...d.data() }));
            renderPedidos();
            renderCaixa();
            if (primeiroSnapMesas) { primeiroSnapMesas = false; return; }
            window.tocarSino?.();
        });

        // ── SENHA EXCLUIR ──────────────────────────────────────────────────────────────
        async function confirmarSenhaExcluir() {
            const { value: senha } = await Swal.fire({
                title: '🔒 Confirmar exclusão', input: 'password',
                inputLabel: 'Digite a senha para excluir', inputPlaceholder: '••••••',
                confirmButtonText: 'Confirmar', confirmButtonColor: '#e74c3c',
                showCancelButton: true, cancelButtonText: 'Cancelar',
                background: '#111', color: '#fff',
            });
            if (!senha) return false;
            const h = await hashSenha(senha);
            if (h === SENHA_EXCLUIR_HASH) return true;
            Swal.fire({ icon: 'error', title: 'Senha incorreta!', background: '#111', color: '#fff', timer: 1500, showConfirmButton: false });
            return false;
        }

        // ── RENDER PEDIDOS ─────────────────────────────────────────────────────────────
        function renderPedidos() {
            const el = document.getElementById('lista-pedidos');
            if (!el) return;
            let html = '';

            if (pedidos.length) {
                html += `<div class="section-label">🛵 Delivery & Balcão <span class="section-label-count">${pedidos.length}</span></div>`;
                const visiveis = verMaisDelivery ? pedidos : pedidos.slice(0, LIMITE_INICIAL_PEDIDOS);
                visiveis.forEach(p => {
                    const totalNum = parseTotal(p.total);
                    const saiu = pedidosSaiu.has(p.id);
                    const bairroTag = p.bairro || '';
                    const isRetirada = bairroTag === 'Retirada no Balcão' || bairroTag === 'Retirada' || (p.endereco || '').includes('Retirada');

                    // ── Exibe pagamentos parciais no card ──
                    const pagsArr = parsePagamentos(p.pagamento || '');
                    let pagHtml = '';
                    if (pagsArr.length > 1) {
                        pagHtml = `<div style="margin:6px 0;font-size:0.78rem;">
                    ${pagsArr.map(pg => `<span style="display:inline-block;margin-right:6px;margin-bottom:4px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);border-radius:6px;padding:2px 8px;">${pg.metodo}: <b style="color:var(--green);">${R(pg.valor)}</b></span>`).join('')}
                </div>`;
                    } else {
                        pagHtml = `<div style="font-size:0.78rem;opacity:0.5;margin-bottom:2px;">Pagamento: ${normalizarPagamento(p.pagamento)}</div>`;
                    }

                    const obsGeralHtml = p.obs ? `<div class="obs-badge"><i class="fas fa-sticky-note"></i><span>${p.obs}</span></div>` : '';
                    const dadosBT = JSON.stringify({ cliente: p.cliente, endereco: p.endereco || '', bairro: bairroTag, pagamento: p.pagamento, itens: p.itens, total: totalNum, desconto: p.desconto || 0 });

                    html += `
            <div class="pedido-card${saiu ? ' saiu-entrega' : ''}" id="card-${p.id}">
                <button class="btn-del" onclick="delPedido('${p.id}')">×</button>
                <div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px;">
                    ${isRetirada
                            ? `<span class="tag" style="background:rgba(232,169,48,0.1);color:var(--gold);border:1px solid rgba(232,169,48,0.3);">📍 RETIRADA NO LOCAL</span>`
                            : `<span class="tag tag-delivery">${p.origem === 'PDV' ? '🏪 BALCÃO/PDV' : '🛵 DELIVERY'}</span>
                           ${bairroTag ? `<span class="tag" style="background:rgba(232,169,48,0.1);color:var(--gold);border:1px solid rgba(232,169,48,0.3);">📍 ${bairroTag.toUpperCase()}</span>` : ''}`
                        }
                </div>
                ${saiu ? '<div class="badge-saiu"><i class="fas fa-motorcycle"></i> SAIU PARA ENTREGA</div>' : ''}
                <div style="margin-top:6px;"><strong>${p.cliente.toUpperCase()}</strong></div>
                ${pagHtml}
                <div style="font-size:0.78rem;margin-bottom:8px;">
                    ${p.telefone
                            ? `<a href="https://wa.me/55${(p.telefone || '').replace(/\D/g, '')}" target="_blank" style="color:#25d366;text-decoration:none;"><i class="fab fa-whatsapp"></i> ${p.telefone}</a>`
                            : '<span style="opacity:0.35;"><i class="fas fa-phone-slash"></i> Sem telefone</span>'
                        }
                </div>
                <div class="lista-itens-card">
                    ${(p.itens || []).map(i => {
                            const vUnit = parseFloat(i.preco) || parseFloat(i.precoTotal) || 0;
                            const qtd = parseInt(i.qty) || 1;
                            return `<div class="item-linha-wrapper" style="margin-bottom:5px;">
                            <div class="item-linha"><span>${qtd}x ${i.nome}</span><b>${R(vUnit * qtd)}</b></div>
                            ${i.obs ? `<div style="font-size:0.72rem;color:#aaa;margin-left:15px;opacity:0.8;">↳ ${i.obs}</div>` : ''}
                        </div>`;
                        }).join('')}
                </div>
                ${obsGeralHtml}
                <div style="font-size:0.78rem;margin-bottom:5px;opacity:0.6;"><i class="fas fa-map-marker-alt"></i> ${p.endereco || 'Não informado'}</div>
                <div style="font-size:1.18rem;color:var(--gold);font-weight:700;">${R(totalNum)}</div>
                <div class="status-actions">
                    <button class="btn-wa bg-blue" onclick="waStatus('${(p.telefone || '').replace(/\D/g, '')}','recebido','${p.cliente}')">RECEBIDO</button>
                    <button class="btn-wa bg-green${saiu ? ' btn-wa-ativo' : ''}" onclick="marcarSaiu('${p.id}','${(p.telefone || '').replace(/\D/g, '')}','${p.cliente}')">
                        ${saiu ? '✅ SAIU' : 'SAIU ENTREGA'}
                    </button>
                </div>
                <button class="btn-add-item-pedido" onclick="abrirEditarPedido('${p.id}')">
                    <i class="fas fa-plus-circle"></i> ADICIONAR ITEM AO PEDIDO
                </button>
                <button class="btn-imprimir-bt" onclick='reimprimirNota(${JSON.stringify(dadosBT)})'>
                    <i class="fas fa-print"></i> REIMPRIMIR NOTA
                </button>
                <button class="btn-imprimir-bt" style="background:rgba(46,204,113,0.1);color:var(--green);border-color:rgba(46,204,113,0.28);" onclick="aplicarDesconto('${p.id}',${totalNum})">
    <i class="fas fa-tag"></i> APLICAR DESCONTO
</button>
            </div>`;
                });
                if (pedidos.length > LIMITE_INICIAL_PEDIDOS) {
                    html += `<button class="btn-ver-mais" onclick="toggleVerMais()">
                <i class="fas fa-${verMaisDelivery ? 'chevron-up' : 'chevron-down'}"></i>
                ${verMaisDelivery ? 'Ver menos' : `Ver mais (${pedidos.length - LIMITE_INICIAL_PEDIDOS} ocultos)`}
            </button>`;
                }
            }

            if (mesasFech.length) {
                html += `<div class="section-label">✅ Mesas Fechadas <span class="section-label-count">${mesasFech.length}</span></div>`;
                mesasFech.forEach(m => {
                    const val = parseFloat(m.total) || 0;
                    const hora = m.fechadoEm?.toDate
                        ? new Date(m.fechadoEm.toDate()).toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' })
                        : '--:--';
                    const obsGeralHtml = m.obs ? `<div class="obs-badge"><i class="fas fa-sticky-note"></i><span>${m.obs}</span></div>` : '';
                    const dadosMesaBT = JSON.stringify({ numero: m.numero, garcom: m.garcom, itens: m.itens, pagamento: m.pagamento, obs: m.obs || '', total: val });

                    // Pagamentos parciais mesas fechadas
                    const pagsArr = parsePagamentos(m.pagamento || '');
                    let pagHtml = '';
                    if (pagsArr.length > 1) {
                        pagHtml = `<div style="margin:4px 0;font-size:0.78rem;">
                    ${pagsArr.map(pg => `<span style="display:inline-block;margin-right:6px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);border-radius:6px;padding:2px 8px;">${pg.metodo}: <b style="color:var(--green);">${R(pg.valor)}</b></span>`).join('')}
                </div>`;
                    } else {
                        pagHtml = `<div style="font-size:0.76rem;opacity:0.45;margin-bottom:8px;">Fechado às ${hora} · ${normalizarPagamento(m.pagamento)}</div>`;
                    }

                    html += `
            <div class="pedido-card mesa-card-closed">
                <button class="btn-del" onclick="delMesaFech('${m.id}',${val})">×</button>
                <span class="tag tag-mesa">🍽️ MESA ${m.numero}</span>
                <div><strong>🧑‍🍳 ${m.garcom}</strong></div>
                ${pagHtml}
                <div class="lista-itens-card">
                    ${(m.itens || []).map(i => {
                        const vUnit = parseFloat(i.preco) || 0;
                        const q = parseInt(i.qty) || 1;
                        return `<div class="item-linha-wrapper" style="margin-bottom:5px;">
                            <div class="item-linha"><span>${q}x ${i.nome}</span><b>${R(vUnit * q)}</b></div>
                            ${i.obs ? `<div style="font-size:0.72rem;color:var(--green);margin-left:15px;opacity:0.8;">↳ ${i.obs.toUpperCase()}</div>` : ''}
                        </div>`;
                    }).join('')}
                </div>
                ${obsGeralHtml}
                <div style="font-size:1.18rem;color:var(--green);font-weight:700;">${R(val)}</div>
                <button class="btn-imprimir-bt" onclick='imprimirMesaBT(${JSON.stringify(dadosMesaBT)})'>
                    <i class="fas fa-print"></i> REIMPRIMIR FECHAMENTO
                </button>
                <button class="btn-imprimir-bt" style="background:rgba(46,204,113,0.1);color:var(--green);border-color:rgba(46,204,113,0.28);" onclick="aplicarDescontoMesa('${m.id}',${val})">
    <i class="fas fa-tag"></i> APLICAR DESCONTO
</button>
            </div>`;
                });
            }

            if (!html) html = '<p style="opacity:0.3;text-align:center;margin-top:60px;grid-column:1/-1;font-size:0.9rem;">Nenhum pedido no momento.</p>';
            el.innerHTML = html;
        }

        window.toggleVerMais = () => { verMaisDelivery = !verMaisDelivery; renderPedidos(); };

        // ── EDITAR PEDIDO DELIVERY ─────────────────────────────────────────────────────
        window.abrirEditarPedido = (pedidoId) => {
            const p = pedidos.find(x => x.id === pedidoId);
            if (!p) return;
            _pedidoEditando = p;
            _carrinhoEditar = (p.itens || []).map(i => ({ ...i }));
            document.getElementById('modal-editar-titulo').textContent = `➕ Adicionar ao pedido de ${p.cliente}`;
            document.getElementById('modal-editar-pedido').classList.add('open');
            renderEditarPedidoBody();
        };

        window.fecharModalEditar = () => {
            document.getElementById('modal-editar-pedido').classList.remove('open');
            _pedidoEditando = null;
            _carrinhoEditar = [];
        };

        function renderEditarPedidoBody() {
            const totAtual = _carrinhoEditar.reduce((s, i) => s + (parseFloat(i.preco) || 0) * (parseInt(i.qty) || 1), 0);

            let cardapioHtml = Object.entries(CARDAPIO).map(([cat, itens]) => `
        <div class="cat-bloco">
            <div class="cat-header" onclick="toggleCat(this)">
                <span class="cat-name">${cat}</span>
                <i class="fas fa-chevron-down chev"></i>
            </div>
            <div class="cat-itens">
                ${itens.map(item => `
                    <button class="item-btn" onclick="addItemEditar('${item.nome.replace(/'/g, "\\'")}',${item.preco})">
                        <span class="i-nome">${item.nome}</span>
                        <span class="i-preco">${R(item.preco)}</span>
                    </button>`).join('')}
            </div>
        </div>`).join('');

            // Adicionais
            cardapioHtml += `
        <div class="cat-bloco">
            <div class="cat-header" onclick="toggleCat(this)">
                <span class="cat-name">➕ Adicionais / Extras</span>
                <i class="fas fa-chevron-down chev"></i>
            </div>
            <div class="cat-itens">
                ${ADICIONAIS.map(item => `
                    <button class="item-btn" onclick="addItemEditar('+ ${item.nome.replace(/'/g, "\\'")}',${item.preco})">
                        <span class="i-nome">+ ${item.nome}</span>
                        <span class="i-preco">${R(item.preco)}</span>
                    </button>`).join('')}
            </div>
        </div>`;

            // Carrinho atual (só os itens novos são editáveis, os originais são só exibição)
            const itensOriginaisHtml = (_pedidoEditando.itens || []).map(i => {
                const v = (parseFloat(i.preco) || 0) * (parseInt(i.qty) || 1);
                return `<div style="display:flex;justify-content:space-between;font-size:0.82rem;padding:4px 0;opacity:0.55;">
            <span>${parseInt(i.qty) || 1}x ${i.nome}</span><span>${R(v)}</span>
        </div>`;
            }).join('');

            // Itens novos adicionados
            const itensNovos = _carrinhoEditar.filter(i => i._novo);
            const itensNovosHtml = itensNovos.length
                ? itensNovos.map((it, idx) => {
                    const globalIdx = _carrinhoEditar.findIndex(x => x === it);
                    return `<div style="display:flex;align-items:center;gap:6px;padding:6px 0;border-bottom:1px solid rgba(255,255,255,0.06);font-size:0.84rem;">
                <span style="flex:1;">${it.nome}</span>
                <div class="qtd-ctrl">
                    <button class="qtd-btn" onclick="chgQtdEditar(${globalIdx},-1)">−</button>
                    <span>${it.qty}x</span>
                    <button class="qtd-btn" onclick="chgQtdEditar(${globalIdx},1)">+</button>
                    <span style="color:var(--gold);min-width:55px;text-align:right;">${R((parseFloat(it.preco) || 0) * it.qty)}</span>
                </div>
            </div>`;
                }).join('')
                : '<p style="opacity:0.3;font-size:0.8rem;text-align:center;padding:8px 0;">Nenhum item novo ainda.</p>';

            const totalNovos = itensNovos.reduce((s, i) => s + (parseFloat(i.preco) || 0) * i.qty, 0);

            document.getElementById('modal-editar-body').innerHTML = `
        <div style="background:rgba(0,0,0,0.4);border-radius:10px;padding:10px;margin-bottom:12px;border:1px solid var(--border);">
            <div style="font-size:0.72rem;color:rgba(255,255,255,0.4);font-weight:700;letter-spacing:1px;margin-bottom:6px;">ITENS ORIGINAIS DO PEDIDO:</div>
            ${itensOriginaisHtml}
            <div style="display:flex;justify-content:space-between;margin-top:6px;font-size:0.88rem;font-weight:700;">
                <span>Subtotal original:</span><span style="color:var(--gold);">${R(parseTotal(_pedidoEditando.total))}</span>
            </div>
        </div>

        ${cardapioHtml}

        <div class="cart-box" style="margin-top:12px;">
            <div class="cart-title">🆕 Itens sendo adicionados</div>
            <div id="editar-itens-novos">${itensNovosHtml}</div>
            ${totalNovos > 0 ? `
            <div style="display:flex;justify-content:space-between;margin-top:8px;padding-top:8px;border-top:1px solid rgba(255,255,255,0.08);font-weight:700;">
                <span>Acréscimo:</span><span style="color:var(--green);">+ ${R(totalNovos)}</span>
            </div>
            <div style="display:flex;justify-content:space-between;margin-top:4px;font-weight:700;font-size:1rem;">
                <span>NOVO TOTAL:</span><span style="color:var(--gold);">${R(parseTotal(_pedidoEditando.total) + totalNovos)}</span>
            </div>` : ''}
        </div>

        ${totalNovos > 0 ? `
        <button onclick="salvarEdicaoPedido()" style="width:100%;margin-top:12px;background:#27ae60;color:white;border:none;padding:14px;border-radius:10px;font-weight:700;cursor:pointer;font-family:'Outfit',sans-serif;font-size:0.9rem;">
            💾 SALVAR E ATUALIZAR PEDIDO
        </button>` : ''}
        <button onclick="fecharModalEditar()" style="width:100%;margin-top:8px;background:none;border:1px solid rgba(255,255,255,0.1);color:rgba(255,255,255,0.5);padding:11px;border-radius:10px;font-weight:700;cursor:pointer;font-family:'Outfit',sans-serif;">
            Cancelar
        </button>`;
        }

        window.addItemEditar = (nome, preco) => {
            const ex = _carrinhoEditar.find(i => i.nome === nome && i._novo);
            if (ex) ex.qty++;
            else _carrinhoEditar.push({ nome, preco: parseFloat(preco), qty: 1, _novo: true });
            renderEditarPedidoBody();
            toast(`${nome} adicionado!`);
        };

        window.chgQtdEditar = (idx, d) => {
            _carrinhoEditar[idx].qty += d;
            if (_carrinhoEditar[idx].qty <= 0) _carrinhoEditar.splice(idx, 1);
            renderEditarPedidoBody();
        };

        window.salvarEdicaoPedido = async () => {
            if (!_pedidoEditando) return;
            const itensNovos = _carrinhoEditar.filter(i => i._novo).map(i => ({ nome: i.nome, preco: i.preco, qty: i.qty }));
            if (!itensNovos.length) return;

            // Junta itens originais + novos (agrupando se o mesmo nome já existia)
            const itensAtualizados = [...(_pedidoEditando.itens || [])];
            itensNovos.forEach(novo => {
                const ex = itensAtualizados.find(i => i.nome === novo.nome);
                if (ex) ex.qty = (parseInt(ex.qty) || 1) + novo.qty;
                else itensAtualizados.push({ nome: novo.nome, preco: novo.preco, qty: novo.qty });
            });

            const acrescimo = itensNovos.reduce((s, i) => s + (i.preco * i.qty), 0);
            const novoTotal = parseTotal(_pedidoEditando.total) + acrescimo;

            try {
                await updateDoc(doc(db, 'pedidos', _pedidoEditando.id), {
                    itens: itensAtualizados,
                    total: novoTotal,
                });
                fecharModalEditar();
                Swal.fire({ icon: 'success', title: 'Pedido atualizado!', html: `Acréscimo: <b>${R(acrescimo)}</b><br>Novo total: <b>${R(novoTotal)}</b>`, background: '#111', color: '#fff', timer: 2500, showConfirmButton: false });
            } catch (e) {
                Swal.fire({ icon: 'error', title: 'Erro!', text: e.message, background: '#111', color: '#fff' });
            }
        };

        // ── MARCAR SAIU ────────────────────────────────────────────────────────────────
        window.marcarSaiu = async (pedidoId, tel, cliente) => {
            if (pedidosSaiu.has(pedidoId)) { pedidosSaiu.delete(pedidoId); renderPedidos(); return; }
            pedidosSaiu.add(pedidoId);
            renderPedidos();
            const pedido = pedidos.find(p => p.id === pedidoId);
            const isRetirada = (pedido?.bairro || '').includes('Retirada') || (pedido?.endereco || '').includes('Retirada');
            const msg = isRetirada
                ? `Notícia boaaa 🤩\n${cliente}, seu pedido está pronto, é só vir buscar!`
                : `Boa Notícia! Seu pedido já saiu para entrega🏍️🤩. Agradecemos a preferência e volte sempre! GC BURGUER.`;
            window.location.href = `whatsapp://send?phone=55${tel.replace(/\D/g, '')}&text=${encodeURIComponent(msg)}`;
            window.toast('Pedido marcado como saiu!');
        };

        window.reimprimirNota = async (dadosJson) => {
    try {
        const p = typeof dadosJson === 'string' ? JSON.parse(dadosJson) : dadosJson;

        // ── CAIXA ──────────────────────────────────────────────────────────────────────
       function renderCaixa() {

    let tDesconto = 0;
    const todosItens = [];

    pedidos.forEach(p => {
        const pagsArr = parsePagamentos(p.pagamento || '');
        if (pagsArr.length > 0) {
            const somaPags = pagsArr.reduce((s, pg) => s + pg.valor, 0);
            const totalReal = parseTotal(p.total);
            // Se a soma dos pagamentos parciais bate com o total, usa parciais
            // Se não (pedido em aberto sem pagamento registrado), usa o total no método informado
            if (Math.abs(somaPags - totalReal) < 0.05 || somaPags > 0) {
                pagsArr.forEach(pg => {
                    if (pg.metodo === 'PIX') tPix += pg.valor;
                    else if (pg.metodo === 'Dinheiro') tDin += pg.valor;
                    else tCrd += pg.valor;
                });
                // Se o total real é maior que a soma dos pagamentos (item adicionado depois),
                // a diferença entra como "sem pagamento definido" mas somamos no total geral
                const diff = totalReal - somaPags;
                if (diff > 0.05) tSemPag += diff;
            } else {
                const v = parseTotal(p.total);
                const m = normalizarPagamento(p.pagamento);
                if (m === 'PIX') tPix += v;
                else if (m === 'Dinheiro') tDin += v;
                else tCrd += v;
            }
        } else {
            // Pedido sem pagamento registrado: soma o total no método informado (ou sem método)
            const v = parseTotal(p.total);
            const m = normalizarPagamento(p.pagamento);
            if (m === 'PIX') tPix += v;
            else if (m === 'Dinheiro') tDin += v;
            else if (m === 'Cartão') tCrd += v;
            else tSemPag += v;
        }
        (p.itens || []).forEach(i => todosItens.push({ ...i }));
    });

    mesasFech.forEach(m => {
        const pagsArr = parsePagamentos(m.pagamento || '');
        if (pagsArr.length > 0) {
            pagsArr.forEach(pg => {
                if (pg.metodo === 'PIX') tPix += pg.valor;
                else if (pg.metodo === 'Dinheiro') tDin += pg.valor;
                else tCrd += pg.valor;
            });
        } else {
            const v = parseFloat(m.total) || 0;
            const pg = normalizarPagamento(m.pagamento);
            if (pg === 'PIX') tPix += v;
            else if (pg === 'Dinheiro') tDin += v;
            else tCrd += v;
        }
        (m.itens || []).forEach(i => todosItens.push({ ...i }));
    });
    pedidos.forEach(p => { tDesconto += parseFloat(p.desconto) || 0; });
    mesasFech.forEach(m => { tDesconto += parseFloat(m.desconto) || 0; });

        <div style="display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-top:2px solid rgba(255,255,255,0.1);font-weight:700;font-size:1rem;">

            <span style="color:var(--gold);font-size:1.2rem;">${R(tot)}</span>
        </div>`;
}

        window.waStatus = (tel, tipo, cliente) => {
            if (!tel) { Swal.fire({ icon: 'warning', title: 'Sem telefone!', background: '#111', color: '#fff', timer: 2000, showConfirmButton: false }); return; }

        (doc.itens || []).forEach(i => {
            const nome = i.nome || '?'; const preco = parseFloat(i.preco) || 0; const qty = parseInt(i.qty) || 1;
            if (!mapa[nome]) mapa[nome] = { qty: 0, total: 0 };
            mapa[nome].qty += qty; mapa[nome].total += preco * qty;
        });
    });
    const lanches = Object.entries(mapa).filter(([n]) => !nomesBebidas.has(n));
    const bebidas = Object.entries(mapa).filter(([n]) => nomesBebidas.has(n));

    cabecalhoSecao('  LANCHES & COMBOS');
    p.autoTable({ head: [['Item', 'Qtd', 'Total']], body: lanches.map(([nome, d]) => [nome, `${d.qty}x`, R(d.total)]), startY: y, margin: { left: 14, right: 14 }, headStyles: { fillColor: [232, 169, 48], textColor: 0, fontStyle: 'bold' }, styles: { fontSize: 9 }, columnStyles: { 1: { halign: 'center', cellWidth: 20 }, 2: { halign: 'right', cellWidth: 30 } } });
    y = p.lastAutoTable.finalY + 8;

    cabecalhoSecao('  BEBIDAS & AÇAÍ');
    p.autoTable({ head: [['Item', 'Qtd', 'Total']], body: bebidas.map(([nome, d]) => [nome, `${d.qty}x`, R(d.total)]), startY: y, margin: { left: 14, right: 14 }, headStyles: { fillColor: [52, 152, 219], textColor: 255, fontStyle: 'bold' }, styles: { fontSize: 9 }, columnStyles: { 1: { halign: 'center', cellWidth: 20 }, 2: { halign: 'right', cellWidth: 30 } } });
    y = p.lastAutoTable.finalY + 12;

    // ── Soma dos pagamentos (mesma lógica do renderCaixa corrigido) ──
    let tPix = 0, tDin = 0, tCrd = 0, tSemPag = 0;

    pedidos.forEach(px => {
        const pagsArr = parsePagamentos(px.pagamento || '');
        if (pagsArr.length > 0) {
            const somaPags = pagsArr.reduce((s, pg) => s + pg.valor, 0);
            const totalReal = parseTotal(px.total);
            pagsArr.forEach(pg => {
                if (pg.metodo === 'PIX') tPix += pg.valor;
                else if (pg.metodo === 'Dinheiro') tDin += pg.valor;
                else tCrd += pg.valor;
            });
            const diff = totalReal - somaPags;
            if (diff > 0.05) tSemPag += diff;
        } else {
            const v = parseTotal(px.total);
            const m = normalizarPagamento(px.pagamento);
            if (m === 'PIX') tPix += v;
            else if (m === 'Dinheiro') tDin += v;
            else if (m === 'Cartão') tCrd += v;
            else tSemPag += v;
        }
    });

    mesasFech.forEach(mx => {
        const pagsArr = parsePagamentos(mx.pagamento || '');
        if (pagsArr.length > 0) {
            pagsArr.forEach(pg => {
                if (pg.metodo === 'PIX') tPix += pg.valor;
                else if (pg.metodo === 'Dinheiro') tDin += pg.valor;
                else tCrd += pg.valor;
            });
        } else {
            const v = parseFloat(mx.total) || 0;
            const pg = normalizarPagamento(mx.pagamento);
            if (pg === 'PIX') tPix += v;
            else if (pg === 'Dinheiro') tDin += v;
            else tCrd += v;
        }
    });

    const tot = tPix + tDin + tCrd + tSemPag;

    if (y > 230) { p.addPage(); y = 20; }
    p.setFontSize(10); p.setFont('helvetica', 'bold');
    p.setFillColor(240, 240, 240); p.rect(14, y, 182, 7, 'F');
    p.text('FATURAMENTO TOTAL', 16, y + 5); y += 12;

    const linhasFaturamento = [
        ['PIX', R(tPix)],
        ['Dinheiro', R(tDin)],
        ['Cartão', R(tCrd)],
        ...(tSemPag > 0 ? [['A receber', R(tSemPag)]] : []),
        ['TOTAL GERAL', R(tot)]
    ];

    p.autoTable({
        body: linhasFaturamento,
        startY: y, margin: { left: 14, right: 14 }, styles: { fontSize: 10 },
        columnStyles: { 1: { halign: 'right' } },
        didParseCell: data => {
            const isUltima = data.row.index === linhasFaturamento.length - 1;
            const isAReceber = tSemPag > 0 && data.row.index === linhasFaturamento.length - 2;
            if (isUltima) {
                data.cell.styles.fontStyle = 'bold';
                data.cell.styles.fillColor = [232, 169, 48];
                data.cell.styles.textColor = 0;
                data.cell.styles.fontSize = 12;
            }
            if (isAReceber) {
                data.cell.styles.textColor = [230, 126, 34];
                data.cell.styles.fontStyle = 'bold';
            }
        }
    });

    const totalPages = p.internal.getNumberOfPages();
    for (let i = 1; i <= totalPages; i++) {
        p.setPage(i); p.setFontSize(8); p.setFont('helvetica', 'normal'); p.setTextColor(150);
        p.text(`GC BURGUER — Gerado em ${new Date().toLocaleString('pt-BR')}`, 14, 290);
        p.text(`Página ${i}/${totalPages}`, 196, 290, { align: 'right' });
        p.setTextColor(0);
    }
    p.save(`relatorio_gc_${dataHoje.replace(/\//g, '-')}.pdf`);
};

                    this.device.addEventListener('gattserverdisconnected', async () => { this.char = null; this._pararKeepAlive(); for (let t = 0; t < 3; t++) { await new Promise(r => setTimeout(r, 1500)); if (await this.reconectar()) return; } });
                    this._iniciarKeepAlive(); window.toast('Impressora conectada!'); return true;
                } catch (e) { return false; }
            },
            async enviar(bytes) {
                if (!this.char) { if (this.device) { const ok = await this.reconectar(); if (!ok) return false; } else { const ok = await this.conectar(); if (!ok) return false; } }
                const CHUNK = 64;
                try { for (let i = 0; i < bytes.length; i += CHUNK) { const fatia = bytes.slice(i, i + CHUNK); if (this.char.properties.writeWithoutResponse) await this.char.writeValueWithoutResponse(fatia); else await this.char.writeValue(fatia); await new Promise(r => setTimeout(r, 50)); } return true; } catch (e) { this.char = null; return false; }
            }
        };

        window.addEventListener('load', () => BT.verificarAutoConectar());
        window.btConectar = () => BT.conectar();

        function escPos() {
            const buf = [], enc = new TextEncoder();
            const p = (b) => buf.push(...(typeof b === 'string' ? enc.encode(limparEsc(b)) : b));
            const INIT = [0x1B, 0x40], CENTRALIZAR = [0x1B, 0x61, 0x01], ESQUERDA = [0x1B, 0x61, 0x00],
                BOLD_ON = [0x1B, 0x45, 0x01], BOLD_OFF = [0x1B, 0x45, 0x00],
                DUPLO_ON = [0x1D, 0x21, 0x11], DUPLO_OFF = [0x1D, 0x21, 0x00],
                CORTAR = [0x1D, 0x56, 0x41, 0x03], NOVA_LINHA = [0x0A];
            return {
                init() { p(INIT); return this; }, centro() { p(CENTRALIZAR); return this; }, esquerda() { p(ESQUERDA); return this; },
                bold(on) { p(on ? BOLD_ON : BOLD_OFF); return this; }, duplo(on) { p(on ? DUPLO_ON : DUPLO_OFF); return this; },
                linha(t = '') { p(t + '\n'); return this; }, nl() { p(NOVA_LINHA); return this; },
                separador(c = '-') { p(c.repeat(BT.LARGURA) + '\n'); return this; },
                cortar() { p(CORTAR); return this; }, bytes() { return new Uint8Array(buf); }
            };
        }
        function limparEsc(t) { return String(t).normalize('NFD').replace(/[\u0300-\u036f]/g, '').replace(/[^\x20-\x7E\n]/g, ''); }
        function Fmt(v) { const n = typeof v === 'number' ? v : parseFloat(v) || 0; return 'R$' + n.toFixed(2).replace('.', ','); }
        function agora() { const d = new Date(); return String(d.getDate()).padStart(2, '0') + '/' + String(d.getMonth() + 1).padStart(2, '0') + '/' + d.getFullYear() + ' ' + String(d.getHours()).padStart(2, '0') + ':' + String(d.getMinutes()).padStart(2, '0'); }
        function linhaItem(nome, valor) { const valStr = Fmt(valor); const limiteNome = BT.LARGURA - valStr.length - 1; let nomeLimpo = limparEsc(nome).substring(0, limiteNome); const espacos = BT.LARGURA - nomeLimpo.length - valStr.length; return nomeLimpo + ' '.repeat(Math.max(1, espacos)) + valStr; }

        function gerarCupomDelivery(p) {
            const itens = p.itens || [], total = typeof p.total === 'number' ? p.total : parseFloat(p.total) || 0, bairro = limparEsc(p.bairro || ''), taxa = (p.taxaEntrega !== undefined) ? p.taxaEntrega : 0, subtotal = total - taxa;
            const doc = escPos().init().centro().duplo(true).bold(true).linha('GC BURGUER').duplo(false).bold(false).linha('DELIVERY / BALCAO').separador('=').esquerda().linha('DATA: ' + agora()).bold(true).linha('CLIENTE: ' + limparEsc(p.cliente || '').toUpperCase()).bold(false).linha('END: ' + limparEsc(p.endereco || 'Retirada'));
            if (bairro) doc.linha('BAIRRO: ' + bairro);
            doc.linha('PAG: ' + limparEsc(p.pagamento || '')).separador('-').bold(true).linha('ITENS DO PEDIDO:').bold(false).nl();
            itens.forEach(i => { const q = parseInt(i.qty) || 1; const vUnit = parseFloat(i.preco) || parseFloat(i.precoTotal) || 0; doc.linha(`${q}x ${limparEsc(i.nome)}`).linha(' '.repeat(17) + 'Sub: ' + Fmt(vUnit * q)); if (i.obs) doc.linha('  >> ' + limparEsc(i.obs)); });
            doc.separador('-');
            if (taxa > 0) { doc.linha(linhaItem('Subtotal', subtotal)).linha(linhaItem('Entrega', taxa)).separador('-'); }
            doc.bold(true).duplo(true).linha(linhaItem('TOTAL', total)).duplo(false).bold(false).separador('=').nl().centro().linha('OBRIGADO PELA PREFERENCIA!').nl().nl().cortar();
            return doc.bytes();
        }

        function gerarCupomMesa(m) {
            const itens = m.itens || [], total = parseFloat(m.total) || itens.reduce((s, i) => s + (i.preco || 0) * (i.qty || 1), 0);
            const doc = escPos().init().centro().duplo(true).bold(true).linha('MESA ' + m.numero).duplo(false).bold(false).linha('CONTA FECHADA').separador('=').esquerda().linha('ATENDENTE: ' + limparEsc(m.garcom || '')).linha('PAG: ' + limparEsc(m.pagamento || '')).linha('HORA: ' + agora()).separador('-').bold(true).linha('ITENS:').bold(false).nl();
            itens.forEach(i => { const q = parseInt(i.qty) || 1; const vUnit = parseFloat(i.preco) || 0; doc.linha(`${q}x ${limparEsc(i.nome)}`).linha(' '.repeat(17) + 'Sub: ' + Fmt(vUnit * q)); });
            if (m.obs) doc.linha('OBS: ' + limparEsc(m.obs));
            doc.separador('-').bold(true).duplo(true).linha(linhaItem('TOTAL', total)).duplo(false).bold(false).nl().centro().linha('OBRIGADO PELA PREFERENCIA!').nl().nl().cortar();
            return doc.bytes();
        }

        window.imprimirMesaBT = async (dadosJson) => {
    try {
        const m = typeof dadosJson === 'string' ? JSON.parse(dadosJson) : dadosJson;
        const docRef = await addDoc(collection(db, 'reimpressoes'), {
            cliente: `MESA ${m.numero}`,
            numero: m.numero,
            garcom: m.garcom || '',
            endereco: 'balcao / mesa',
            telefone: '',
            pagamento: m.pagamento || '',
            itens: m.itens || [],
            total: m.total || 0,
            desconto: m.desconto || 0,
            obs: m.obs || '',
            data: new Date(),
            tipo: 'MESA'
        });
        setTimeout(async () => { try { await deleteDoc(docRef); } catch (e) { } }, 10000);
        window.toast('Reimpressão enviada para a impressora!');
    } catch (e) {
        Swal.fire({ icon: 'error', title: 'Erro!', text: e.message, background: '#111', color: '#fff' });
    }
};

        // ── SOM ─────────────────────────────────────────────────────────────────────────
        let somAtivo = false;
        window.toggleSom = () => {
            somAtivo = !somAtivo;
            document.getElementById('som-icon').className = somAtivo ? 'fas fa-volume-up' : 'fas fa-volume-mute';
            document.getElementById('som-label').textContent = somAtivo ? 'SOM ON' : 'SOM';
            document.getElementById('btn-som').style.background = somAtivo ? 'rgba(232,169,48,0.15)' : 'none';
            if (somAtivo) { const b = document.getElementById('bell'); b.volume = 0; b.play().then(() => b.pause()).catch(() => { }); b.volume = 1; }
            window.toast(somAtivo ? '🔔 Som ativado!' : '🔕 Som desativado!');
        };
        window.tocarSino = () => { if (!somAtivo) return; const b = document.getElementById('bell'); b.currentTime = 0; b.play().catch(() => { }); };

        // ── OLHINHO NAS SENHAS ──────────────────────────────────────────────────────────
        const _swalOrig = Swal.fire.bind(Swal);
        Swal.fire = function (opts, ...args) {
            if (opts && opts.input === 'password') {
                const _didOpen = opts.didOpen;
                opts.didOpen = (popup) => {
                    if (_didOpen) _didOpen(popup);
                    const inp = popup.querySelector('.swal2-input');
                    if (!inp) return;
                    inp.style.paddingRight = '44px';
                    const btn = document.createElement('button');
                    btn.type = 'button'; btn.innerHTML = '<i class="fas fa-eye"></i>';
                    btn.style.cssText = 'position:absolute;right:60px;top:55%;transform:translateY(-50%);background:none;border:none;color:rgba(255,255,255,0.4);cursor:pointer;font-size:1rem;padding:4px;line-height:1;transition:color 0.2s;';
                    btn.onclick = () => { const v = inp.type === 'text'; inp.type = v ? 'password' : 'text'; btn.innerHTML = `<i class="fas fa-eye${v ? '' : '-slash'}"></i>`; inp.focus(); };
                    inp.parentElement.style.position = 'relative'; inp.parentElement.appendChild(btn);
                };
            }
            return _swalOrig(opts, ...args);
        };
        

        // Bloqueios de segurança
        document.addEventListener('keydown', e => { if (e.ctrlKey && (e.key === 'u' || e.key === 'U')) e.preventDefault(); if (e.key === 'F12') e.preventDefault(); if (e.ctrlKey && e.shiftKey && e.key === 'I') e.preventDefault(); });
        document.addEventListener('contextmenu', e => e.preventDefault());
    </script>
