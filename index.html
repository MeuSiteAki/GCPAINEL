<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GC BURGUER</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root {
            --gold: #e8a930;
            --gold-dim: rgba(232,169,48,0.15);
            --dark: #080808;
            --card: #111111;
            --card2: #161616;
            --border: rgba(255,255,255,0.07);
            --green: #2ecc71;
            --red: #e74c3c;
            --orange: #e67e22;
        }
        * { box-sizing: border-box; }
        body {
            background: var(--dark);
            background-image: radial-gradient(ellipse 80% 50% at 50% -20%, rgba(232,169,48,0.07), transparent);
            color: white;
            font-family: 'Outfit', sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
        }

        /* ── TOP BAR ─────────────────────────── */
        .topbar {
            background: rgba(10,10,10,0.97);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .topbar-inner {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            align-items: center;
        }
        .brand {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.3rem;
            letter-spacing: 3px;
            color: var(--gold);
            padding: 12px 16px;
            border-right: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
            white-space: nowrap;
        }
        .tabs-menu {
            display: flex;
            flex: 1;
            align-items: center;
            overflow: visible;
            position: relative;
        }
        .tab-btn {
            background: none;
            border: none;
            color: rgba(255,255,255,0.4);
            padding: 16px 14px;
            cursor: pointer;
            font-weight: 600;
            white-space: nowrap;
            font-size: 0.78rem;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            font-family: 'Outfit', sans-serif;
            transition: 0.2s;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        .tab-btn::after {
            content: '';
            position: absolute;
            bottom: 0; left: 14px; right: 14px;
            height: 2px;
            background: var(--gold);
            transform: scaleX(0);
            transition: transform 0.2s;
        }
        .tab-btn.active::after { transform: scaleX(1); }
        .tab-btn:hover { color: rgba(255,255,255,0.75); background: rgba(255,255,255,0.03); }
        .tab-btn.active { color: var(--gold); background: rgba(232,169,48,0.07); }
        .tab-btn i { font-size: 0.85rem; }

        /* ── MENU MOBILE ── */
        .btn-mais { display: none !important; }
        .menu-extras { display: flex; }

        @media (max-width: 700px) {
            .topbar-inner { flex-wrap: wrap; }
            .brand {
                border-right: none;
                border-bottom: 1px solid var(--border);
                width: 100%;
                padding: 10px 14px;
                font-size: 1.1rem;
            }
            .tabs-menu {
                width: 100%;
                gap: 4px;
                padding: 6px 8px;
                flex-wrap: nowrap;
            }
            .tab-btn:not(.btn-mais) {
                flex: 1;
                padding: 10px 6px;
                font-size: 0.68rem;
                letter-spacing: 0.5px;
            }
            .tab-btn::after { display: none; }
            .tab-btn.active { border-radius: 8px; background: rgba(232,169,48,0.15); }
            .btn-mais {
                display: flex !important;
                flex: 0 0 40px;
                align-items: center;
                justify-content: center;
                background: transparent !important;
                border: 1px solid rgba(255,215,0,0.3) !important;
                color: var(--gold) !important;
                height: 38px;
                border-radius: 8px;
                cursor: pointer;
                padding: 0 10px;
                font-size: 0.9rem;
            }
            .menu-extras {
                display: none;
                flex-direction: column;
                position: absolute;
                top: calc(100% + 4px);
                right: 8px;
                width: 200px;
                background: #111;
                border: 1px solid var(--border);
                border-radius: 12px;
                z-index: 9999;
                box-shadow: 0 10px 30px rgba(0,0,0,0.9);
                overflow: hidden;
            }
            .menu-extras.show {
                display: flex;
                animation: fadeIn 0.18s ease-out;
            }
            .menu-extras .tab-btn {
                width: 100%;
                justify-content: flex-start;
                padding: 14px 16px;
                border-bottom: 1px solid rgba(255,255,255,0.05);
                border-radius: 0;
                font-size: 0.82rem;
            }
            .menu-extras .tab-btn::after { display: none; }
            .menu-extras .tab-btn:last-child { border-bottom: none; }
        }

        @media (min-width: 701px) and (max-width: 960px) {
            .tab-btn { padding: 14px 10px; font-size: 0.72rem; letter-spacing: 1px; }
            .tab-btn::after { left: 10px; right: 10px; }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .content-section { display: none; max-width: 1200px; margin: 0 auto; padding: 16px 12px; }
        .content-section.active { display: block; }

        /* ── BLUETOOTH BAR ───────────────────── */
        .bt-bar-wrapper {
            max-width: 1200px;
            margin: 10px auto 0;
            padding: 0 12px;
        }
        .bt-bar {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(37,211,102,0.05);
            border: 1px solid rgba(37,211,102,0.18);
            border-radius: 10px;
            padding: 10px 14px;
            flex-wrap: wrap;
        }
        .bt-status-dot {
            width: 10px; height: 10px; border-radius: 50%;
            background: #555; flex-shrink: 0; transition: background 0.3s;
        }
        .bt-status-dot.conectado { background: #2ecc71; box-shadow: 0 0 6px #2ecc71; }
        .bt-status-dot.erro { background: #e74c3c; }
        .bt-status-text { font-size: 0.8rem; font-weight: 600; flex: 1; color: rgba(255,255,255,0.6); }
        .btn-bt-conectar {
            background: rgba(37,211,102,0.12);
            color: #2ecc71;
            border: 1px solid rgba(37,211,102,0.3);
            border-radius: 8px;
            padding: 7px 14px;
            font-size: 0.75rem;
            font-weight: 700;
            cursor: pointer;
            font-family: 'Outfit', sans-serif;
            transition: 0.18s;
            white-space: nowrap;
        }
        .btn-bt-conectar:hover { background: rgba(37,211,102,0.25); }
        .btn-imprimir-bt {
            background: rgba(232,169,48,0.1);
            color: var(--gold);
            border: 1px solid rgba(232,169,48,0.28);
            border-radius: 8px;
            padding: 8px 12px;
            font-size: 0.74rem;
            font-weight: 700;
            cursor: pointer;
            font-family: 'Outfit', sans-serif;
            transition: 0.18s;
            display: flex;
            align-items: center;
            gap: 5px;
            white-space: nowrap;
            margin-top: 8px;
            width: 100%;
            justify-content: center;
        }
        .btn-imprimir-bt:hover { background: rgba(232,169,48,0.22); }
        .btn-imprimir-bt:disabled { opacity: 0.35; cursor: not-allowed; }

        /* ── MESAS ──────────────────────────── */
        .mesas-header { margin-bottom: 18px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; }
        .mesas-header h2 { font-family: 'Bebas Neue', sans-serif; font-size: 1.8rem; letter-spacing: 3px; color: var(--gold); margin: 0; }
        .mesas-stats { display: flex; gap: 10px; }
        .stat-pill {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 5px 14px;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.5px;
        }
        .stat-pill.ocp { border-color: rgba(230,126,34,0.4); color: var(--orange); background: rgba(230,126,34,0.07); }
        .stat-pill.liv { border-color: rgba(46,204,113,0.4); color: var(--green); background: rgba(46,204,113,0.07); }

        .mesas-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 14px;
        }
        @media(max-width: 520px) { .mesas-grid { grid-template-columns: 1fr; } }

        .mesa-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 18px 16px;
            cursor: pointer;
            transition: all 0.22s;
            position: relative;
            overflow: hidden;
        }
        .mesa-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: var(--border);
            transition: 0.22s;
        }
        .mesa-card:hover { transform: translateY(-2px); border-color: rgba(232,169,48,0.3); }
        .mesa-card:hover::before { background: var(--gold); }
        .mesa-card.ocupada { border-color: rgba(230,126,34,0.3); background: linear-gradient(135deg, #141008, #0f0f0f); }
        .mesa-card.ocupada::before { background: var(--orange); }
        .mesa-card.livre { border-color: rgba(46,204,113,0.2); }
        .mesa-card.livre::before { background: var(--green); }

        .mesa-card-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 12px; }
        .mesa-num { font-family: 'Bebas Neue', sans-serif; font-size: 2rem; letter-spacing: 2px; line-height: 1; color: white; }
        .mesa-status-badge { font-size: 0.65rem; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; padding: 3px 9px; border-radius: 20px; }
        .badge-livre { background: rgba(46,204,113,0.12); color: var(--green); border: 1px solid rgba(46,204,113,0.3); }
        .badge-ocupada { background: rgba(230,126,34,0.12); color: var(--orange); border: 1px solid rgba(230,126,34,0.3); }

        .mesa-garcom-row { display: flex; align-items: center; gap: 6px; font-size: 0.8rem; color: rgba(255,255,255,0.5); margin-bottom: 12px; }
        .mesa-garcom-row span { color: var(--gold); font-weight: 600; }

        .mesa-itens-lista { background: rgba(0,0,0,0.35); border-radius: 10px; padding: 10px 12px; margin-bottom: 12px; border: 1px solid var(--border); }
        .mesa-item-row { display: flex; justify-content: space-between; align-items: center; font-size: 0.78rem; padding: 3px 0; border-bottom: 1px solid rgba(255,255,255,0.04); }
        .mesa-item-row:last-child { border-bottom: none; }
        .mesa-item-nome { color: rgba(255,255,255,0.75); }
        .mesa-item-preco { color: var(--gold); font-weight: 600; white-space: nowrap; margin-left: 8px; }

        .mesa-total-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
        .mesa-total-label { font-size: 0.75rem; color: rgba(255,255,255,0.4); font-weight: 600; letter-spacing: 1px; text-transform: uppercase; }
        .mesa-total-val { font-size: 1.25rem; font-weight: 700; color: var(--green); }

        .mesa-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .mesa-act-btn {
            padding: 10px 6px;
            border: none;
            border-radius: 10px;
            font-size: 0.75rem;
            font-weight: 700;
            cursor: pointer;
            letter-spacing: 0.5px;
            font-family: 'Outfit', sans-serif;
            transition: 0.18s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }
        .mesa-act-btn.btn-pedido { background: rgba(232,169,48,0.15); color: var(--gold); border: 1px solid rgba(232,169,48,0.35); }
        .mesa-act-btn.btn-pedido:hover { background: rgba(232,169,48,0.28); }
        .mesa-act-btn.btn-cozinha { background: rgba(230,126,34,0.15); color: var(--orange); border: 1px solid rgba(230,126,34,0.35); }
        .mesa-act-btn.btn-cozinha:hover { background: rgba(230,126,34,0.28); }
        .mesa-act-btn.btn-cozinha-ok { background: rgba(46,204,113,0.08); color: rgba(46,204,113,0.5); border: 1px solid rgba(46,204,113,0.2); cursor: default; }
        .mesa-act-btn.btn-fechar { background: rgba(46,204,113,0.15); color: var(--green); border: 1px solid rgba(46,204,113,0.35); }
        .mesa-act-btn.btn-fechar:hover { background: rgba(46,204,113,0.28); }

        .mesa-livre-inner { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 16px 0; gap: 8px; }
        .mesa-livre-icon { font-size: 2.2rem; opacity: 0.35; }
        .mesa-livre-text { font-size: 0.8rem; color: rgba(255,255,255,0.3); font-weight: 500; }
        .btn-abrir-mesa { width: 100%; padding: 12px; background: rgba(46,204,113,0.1); color: var(--green); border: 1px solid rgba(46,204,113,0.3); border-radius: 10px; cursor: pointer; font-weight: 700; font-size: 0.8rem; font-family: 'Outfit', sans-serif; letter-spacing: 1px; transition: 0.18s; }
        .btn-abrir-mesa:hover { background: rgba(46,204,113,0.22); }

        /* ── PEDIDOS ────────────────────────── */
       .pedidos-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 16px; }
@media(max-width: 640px) { .pedidos-grid { grid-template-columns: 1fr; } }

        .pedido-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 15px;
            padding: 16px;
            position: relative;
            border-top: 3px solid var(--gold);
            transition: all 0.3s;
        }
        .pedido-card.mesa-card-closed { border-top-color: var(--green); }

        /* ── CARD SAIU ENTREGA DESTAQUE ── */
        .pedido-card.saiu-entrega {
            border-color: rgba(52,152,219,0.6);
            border-top-color: #3498db;
            background: linear-gradient(135deg, #050d14, #0a0a0a);
            box-shadow: 0 0 18px rgba(52,152,219,0.15);
        }
        .badge-saiu {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            background: rgba(52,152,219,0.15);
            color: #3498db;
            border: 1px solid rgba(52,152,219,0.4);
            border-radius: 20px;
            font-size: 0.68rem;
            font-weight: 700;
            letter-spacing: 1px;
            padding: 3px 10px;
            margin-top: 8px;
        }
        .badge-saiu i { font-size: 0.72rem; }

        /* ── BTN DELETE COM SENHA ── */
        .btn-del {
            position: absolute;
            top: 10px; right: 10px;
            background: none;
            border: none;
            color: #ff4d4d;
            font-size: 20px;
            cursor: pointer;
            opacity: 0.55;
            line-height: 1;
            transition: opacity 0.18s;
        }
        .btn-del:hover { opacity: 1; }

        .lista-itens-card { background: rgba(0,0,0,0.3); padding: 10px; border-radius: 8px; margin: 8px 0; font-size: 0.88rem; }
        .item-linha { border-bottom: 1px solid rgba(255,255,255,0.05); padding: 4px 0; display: flex; justify-content: space-between; }
        .status-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 14px; }
        .btn-wa { border: none; padding: 10px; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; font-size: 0.78rem; font-family: 'Outfit', sans-serif; transition: 0.2s; }
        .bg-blue { background: #2980b9; }
        .bg-blue:hover { background: #3498db; }
        .bg-green { background: #27ae60; }
        .bg-green:hover { background: #2ecc71; }
        .btn-wa-ativo { background: linear-gradient(135deg, #1a4a72, #1e6091) !important; border: 1px solid #3498db !important; }

        .tag { display: inline-block; border-radius: 6px; font-size: 0.68rem; padding: 2px 9px; font-weight: 700; margin-bottom: 5px; letter-spacing: 1px; }
        .tag-delivery { background: rgba(232,169,48,0.15); color: var(--gold); border: 1px solid rgba(232,169,48,0.4); }
        .tag-mesa { background: rgba(46,204,113,0.12); color: var(--green); border: 1px solid rgba(46,204,113,0.35); }
        .section-label {
            color: rgba(255,255,255,0.3);
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin: 24px 0 12px;
            grid-column: 1 / -1;
            padding-left: 10px;
            border-left: 3px solid var(--gold);
        }

        /* ── VER MAIS / VER MENOS ── */
        .btn-ver-mais {
            grid-column: 1 / -1;
            background: rgba(232,169,48,0.08);
            color: var(--gold);
            border: 1px solid rgba(232,169,48,0.25);
            border-radius: 10px;
            padding: 12px 20px;
            cursor: pointer;
            font-weight: 700;
            font-size: 0.8rem;
            font-family: 'Outfit', sans-serif;
            letter-spacing: 1px;
            transition: 0.18s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 4px;
        }
        .btn-ver-mais:hover { background: rgba(232,169,48,0.18); }

        /* ── OBS NOS PEDIDOS ── */
        .obs-badge {
            display: flex;
            align-items: flex-start;
            gap: 6px;
            background: rgba(232,169,48,0.06);
            border: 1px solid rgba(232,169,48,0.18);
            border-radius: 8px;
            padding: 7px 10px;
            margin: 8px 0;
            font-size: 0.77rem;
            color: rgba(255,255,255,0.6);
            line-height: 1.4;
        }
        .obs-badge i { color: var(--gold); flex-shrink: 0; margin-top: 1px; }

        .taxa-entrega-row {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.8rem;
            color: #3498db;
            margin-bottom: 6px;
            font-weight: 600;
        }

        /* ── ESTOQUE ────────────────────────── */
        .estoque-grid { display: grid; grid-template-columns: 1fr; gap: 10px; }
        @media(min-width: 500px) { .estoque-grid { grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); } }
        .item-estoque { background: var(--card); padding: 16px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; border: 1px solid var(--border); }
        .switch { position: relative; display: inline-block; width: 46px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #333; transition: .3s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 17px; width: 17px; left: 3.5px; bottom: 3.5px; background-color: white; transition: .3s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--gold); }
        input:checked + .slider:before { transform: translateX(22px); }

        /* ── CAIXA ──────────────────────────── */
        .caixa-container { display: flex; flex-direction: column; gap: 20px; }
        @media(min-width: 900px) { .caixa-container { display: grid; grid-template-columns: 1fr 340px; } }
        .caixa-sidebar { background: var(--card); padding: 25px; border-radius: 20px; border: 1px solid rgba(232,169,48,0.25); text-align: center; height: fit-content; }
        .valor-total { font-family: 'Bebas Neue', sans-serif; font-size: 3rem; color: var(--gold); letter-spacing: 3px; margin: 12px 0; }

        /* ── MODAL ──────────────────────────── */
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 1000; justify-content: center; align-items: flex-start; overflow-y: auto; padding: 12px; }
        .modal-overlay.open { display: flex; }
        .modal-box { background: #0f0f0f; border: 1px solid rgba(232,169,48,0.3); border-radius: 20px; width: 100%; max-width: 540px; overflow: hidden; }
        .modal-header { background: linear-gradient(135deg, #150f00, #1a1400); padding: 14px 18px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid rgba(232,169,48,0.15); }
        .modal-header h3 { margin: 0; color: var(--gold); font-family: 'Bebas Neue', sans-serif; letter-spacing: 2px; font-size: 1.2rem; }
        .modal-close { background: none; border: none; color: white; font-size: 20px; cursor: pointer; line-height: 1; opacity: 0.6; transition: 0.15s; }
        .modal-close:hover { opacity: 1; }
        .modal-body { padding: 16px 18px; max-height: 85vh; overflow-y: auto; }

        /* GARÇONS */
        .garcons-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .garcom-btn { background: var(--card2); border: 1px solid var(--border); color: white; padding: 16px 8px; border-radius: 12px; cursor: pointer; text-align: center; transition: 0.2s; font-size: 0.88rem; font-weight: 500; font-family: 'Outfit', sans-serif; }
        .garcom-btn:hover, .garcom-btn.sel { background: var(--gold-dim); color: var(--gold); border-color: rgba(232,169,48,0.5); font-weight: 700; }
        .garcom-icon { font-size: 1.8rem; display: block; margin-bottom: 6px; }

        /* ACORDEÃO */
        .cat-bloco { margin-bottom: 7px; border-radius: 11px; overflow: hidden; border: 1px solid var(--border); }
        .cat-header { display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.04); padding: 12px 15px; cursor: pointer; user-select: none; transition: background 0.18s; }
        .cat-header:hover { background: var(--gold-dim); }
        .cat-header .cat-name { font-weight: 700; font-size: 0.9rem; }
        .cat-header .chev { font-size: 0.72rem; opacity: 0.5; transition: transform 0.22s; }
        .cat-header.open .chev { transform: rotate(180deg); }

    // ── CAIXA ────────────────────────────────────────
    function renderCaixa() {
    if (!abasLiberadas['aba-caixa']) return;

    let tPix=0, tDin=0, tCrd=0;
    const todosItens = [];

    pedidos.forEach(p => {
        const pg = normalizarPagamento(p.pagamento);
        const v  = parseTotal(p.total);
        if(pg==='PIX') tPix+=v; else if(pg==='Dinheiro') tDin+=v; else tCrd+=v;
        (p.itens||[]).forEach(i => todosItens.push({ ...i, _origem: 'delivery' }));
    });
    mesasFech.forEach(m => {
        const pg = normalizarPagamento(m.pagamento);
        const v  = parseFloat(m.total)||0;
        if(pg==='PIX') tPix+=v; else if(pg==='Dinheiro') tDin+=v; else tCrd+=v;
        (m.itens||[]).forEach(i => todosItens.push({ ...i, _origem: 'mesa' }));
    });

    const tot = tPix + tDin + tCrd;

    // Agrupa itens por nome somando qty e valor
    const mapa = {};
    todosItens.forEach(i => {
        const nome = i.nome || '?';
        const preco = parseFloat(i.preco) || 0;
        const qty   = parseInt(i.qty) || 1;
        if (!mapa[nome]) mapa[nome] = { qty: 0, total: 0, preco };
        mapa[nome].qty   += qty;
        mapa[nome].total += preco * qty;
    });

    // Separa lanches de bebidas (bebidas = itens do grupo 'bebidas' e 'açaí')
    const nomesBebidas = new Set([
        ...CARDAPIO['bebidas'].map(x=>x.nome),
        ...CARDAPIO['açaí'].map(x=>x.nome)
    ]);

    const lanches  = Object.entries(mapa).filter(([n]) => !nomesBebidas.has(n));
    const bebidas  = Object.entries(mapa).filter(([n]) =>  nomesBebidas.has(n));

    function renderGrupo(lista) {
        if (!lista.length) return '<div style="opacity:0.3;font-size:0.82rem;">Nenhum item.</div>';
        return lista.map(([nome, d]) => `
            <div style="display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid rgba(255,255,255,0.05);font-size:0.88rem;">
                <span>${d.qty}x ${nome}</span>
                <b style="color:var(--gold);">${R(d.total)}</b>
            </div>`).join('');
    }

    const cel = document.getElementById('c-total');
    const met = document.getElementById('c-metodos');
    const det = document.getElementById('caixa-detalhe');

    if(cel) cel.textContent = R(tot);
    if(met) met.innerHTML = `
        <div style="display:flex;justify-content:space-between;margin-bottom:10px;font-size:0.88rem;"><span style="opacity:0.6;">PIX</span><b>${R(tPix)}</b></div>
        <div style="display:flex;justify-content:space-between;margin-bottom:10px;font-size:0.88rem;"><span style="opacity:0.6;">Dinheiro</span><b>${R(tDin)}</b></div>
        <div style="display:flex;justify-content:space-between;font-size:0.88rem;"><span style="opacity:0.6;">Cartão</span><b>${R(tCrd)}</b></div>`;

    if(det) det.innerHTML = `
        <div style="margin-bottom:18px;">
            <div style="font-size:0.75rem;letter-spacing:2px;opacity:0.4;font-weight:600;margin-bottom:8px;">🍔 LANCHES & COMBOS</div>
            ${renderGrupo(lanches)}
        </div>
        <div style="margin-bottom:18px;">
            <div style="font-size:0.75rem;letter-spacing:2px;opacity:0.4;font-weight:600;margin-bottom:8px;">🥤 BEBIDAS & AÇAÍ</div>
            ${renderGrupo(bebidas)}
        </div>
        <div style="display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-top:2px solid rgba(255,255,255,0.1);font-weight:700;font-size:1rem;">
            <span>TOTAL GERAL</span>
            <span style="color:var(--gold);font-size:1.2rem;">${R(tot)}</span>
        </div>`;
}

   window.gerarPDF = () => {
    const { jsPDF } = window.jspdf;
    const p = new jsPDF();
    const dataHoje = new Date().toLocaleDateString('pt-BR');

    // ── CABEÇALHO ──
    p.setFontSize(18);
    p.setFont('helvetica', 'bold');
    p.text("GC BURGUER", 105, 16, { align: 'center' });

    p.setFontSize(11);
    p.setFont('helvetica', 'normal');
    p.text(`Relatório do Dia — ${dataHoje}`, 105, 24, { align: 'center' });

    p.setDrawColor(200, 200, 200);
    p.line(14, 28, 196, 28);

    let y = 36;

    // ── FUNÇÃO AUXILIAR DE SEÇÃO ──
    function cabecalhoSecao(titulo) {
        p.setFontSize(10);
        p.setFont('helvetica', 'bold');
        p.setFillColor(240, 240, 240);
        p.rect(14, y, 182, 7, 'F');
        p.text(titulo, 16, y + 5);
        y += 10;
    }

    // ── LANCHES & COMBOS ──
    const nomesBebidas = new Set([
        ...CARDAPIO['bebidas'].map(x => x.nome),
        ...CARDAPIO['açaí'].map(x => x.nome)
    ]);

    // Agrupa todos os itens
    const mapa = {};
    [...pedidos, ...mesasFech].forEach(doc => {
        (doc.itens || []).forEach(i => {
            const nome  = i.nome || '?';
            const preco = parseFloat(i.preco) || 0;
            const qty   = parseInt(i.qty) || 1;
            if (!mapa[nome]) mapa[nome] = { qty: 0, total: 0 };
            mapa[nome].qty   += qty;
            mapa[nome].total += preco * qty;
        });
    });

    const lanches = Object.entries(mapa).filter(([n]) => !nomesBebidas.has(n));
    const bebidas = Object.entries(mapa).filter(([n]) =>  nomesBebidas.has(n));

    // Tabela Lanches
    cabecalhoSecao('  LANCHES & COMBOS');
    p.autoTable({
        head: [['Item', 'Qtd', 'Total']],
        body: lanches.map(([nome, d]) => [nome, `${d.qty}x`, R(d.total)]),
        startY: y,
        margin: { left: 14, right: 14 },
        headStyles: { fillColor: [232, 169, 48], textColor: 0, fontStyle: 'bold' },
        styles: { fontSize: 9 },
        columnStyles: { 1: { halign: 'center', cellWidth: 20 }, 2: { halign: 'right', cellWidth: 30 } },
        didDrawPage: (data) => { y = data.cursor.y + 6; }
    });
    y = p.lastAutoTable.finalY + 8;

    // Tabela Bebidas
    cabecalhoSecao('  BEBIDAS & AÇAÍ');
    p.autoTable({
        head: [['Item', 'Qtd', 'Total']],
        body: bebidas.map(([nome, d]) => [nome, `${d.qty}x`, R(d.total)]),
        startY: y,
        margin: { left: 14, right: 14 },
        headStyles: { fillColor: [52, 152, 219], textColor: 255, fontStyle: 'bold' },
        styles: { fontSize: 9 },
        columnStyles: { 1: { halign: 'center', cellWidth: 20 }, 2: { halign: 'right', cellWidth: 30 } },
    });
    y = p.lastAutoTable.finalY + 12;

    // ── FATURAMENTO TOTAL ──
    let tPix = 0, tDin = 0, tCrd = 0;
    pedidos.forEach(p => {
        const v  = parseTotal(p.total);
        const pg = normalizarPagamento(p.pagamento);
        if (pg === 'PIX') tPix += v; else if (pg === 'Dinheiro') tDin += v; else tCrd += v;
    });
    mesasFech.forEach(m => {
        const v  = parseFloat(m.total) || 0;
        const pg = normalizarPagamento(m.pagamento);
        if (pg === 'PIX') tPix += v; else if (pg === 'Dinheiro') tDin += v; else tCrd += v;
    });
    const tot = tPix + tDin + tCrd;

    // Verifica se precisa de nova página
    if (y > 230) { p.addPage(); y = 20; }

    p.setFontSize(10);
    p.setFont('helvetica', 'bold');
    p.setFillColor(240, 240, 240);
    p.rect(14, y, 182, 7, 'F');
    p.text('FATURAMENTO TOTAL', 16, y + 5);
    y += 12;

    p.autoTable({
        body: [
            ['PIX',      R(tPix)],
            ['Dinheiro', R(tDin)],
            ['Cartão',   R(tCrd)],
            ['TOTAL GERAL', R(tot)],
        ],
        startY: y,
        margin: { left: 14, right: 14 },
        styles: { fontSize: 10 },
        columnStyles: { 1: { halign: 'right' } },
        bodyStyles: { fontStyle: 'normal' },
        didParseCell: (data) => {
            // Linha do total em destaque
            if (data.row.index === 3) {
                data.cell.styles.fontStyle  = 'bold';
                data.cell.styles.fillColor  = [232, 169, 48];
                data.cell.styles.textColor  = 0;
                data.cell.styles.fontSize   = 12;
            }
        }
    });

    // ── RODAPÉ ──
    const totalPages = p.internal.getNumberOfPages();
    for (let i = 1; i <= totalPages; i++) {
        p.setPage(i);
        p.setFontSize(8);
        p.setFont('helvetica', 'normal');
        p.setTextColor(150);
        p.text(`GC BURGUER — Gerado em ${new Date().toLocaleString('pt-BR')}`, 14, 290);
        p.text(`Página ${i}/${totalPages}`, 196, 290, { align: 'right' });
        p.setTextColor(0);
    }

    p.save(`relatorio_gc_${dataHoje.replace(/\//g, '-')}.pdf`);
};

    window.finalizarPedidoPDV = async () => {

        try {
            const itensFormatados = carrinhoPDV.map(item => ({
                nome: item.nome, preco: parseFloat(item.preco)||0, qty: parseInt(item.qty)||1

            await addDoc(collection(db,'pedidos'), {
                cliente: nome, telefone: tel, endereco: endCompleto, bairro,

            await addDoc(collection(db,'caixa'), {
                descricao: `Venda PDV: ${nome}`, valor: valorFinal,

            });
            if (tel) {
                await setDoc(doc(db,'clientes',tel), {
                    nome, telefone:tel, endereco:end, bairro, ultimaCompra:new Date()
                }, { merge:true });
            }
            Swal.fire({ icon:'success', title:'Pedido Concluído!', text:`Pago via ${pag}`, timer:1500, showConfirmButton:false, background:'#111', color:'#fff' });
            carrinhoPDV = []; totalPDV = 0;
            window.renderPDVConteudo();
        } catch(e) {
            console.error('Erro PDV:', e);
            Swal.fire({ icon:'error', title:'Erro!', text:'Falha ao salvar no banco de dados.', background:'#111', color:'#fff' });
        }

    // ── CLIENTES ─────────────────────────────────────
    window.renderListaClientes = async (filtro='') => {
        const container = document.getElementById('lista-clientes-geral');
        if (!container) return;
        try {
            const snap = await getDocs(query(collection(db,'clientes'), orderBy('nome')));
            let html = '';
            snap.forEach(docSnap => {
                const c = docSnap.data(); const id = docSnap.id;
                if (c.nome.toLowerCase().includes(filtro.toLowerCase()) || id.includes(filtro)) {
                    html += `
                    <div style="background:rgba(255,255,255,0.03);border:1px solid var(--border);padding:14px;border-radius:12px;display:flex;justify-content:space-between;align-items:center;gap:10px;">
                        <div style="min-width:0;flex:1;">
                            <strong style="color:var(--gold);font-size:1rem;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${c.nome.toUpperCase()}</strong>
                            <span style="font-size:0.85rem;opacity:0.75;"><i class="fab fa-whatsapp"></i> ${id}</span><br>
                            <span style="font-size:0.78rem;opacity:0.55;">📍 ${c.bairro||'Sem bairro'}${c.endereco?' — '+c.endereco:''}</span>
                        </div>

                            <i class="fas fa-trash"></i>

        } catch(e) { console.error(e); }

        if (!ok) return;

<!-- ════════════════════════════════════════════
     BLUETOOTH — ESC/POS GENÉRICO
════════════════════════════════════════════ -->
<script>
const BT = {
    device: null,
    char: null,
    _keepAliveTimer: null,
    LARGURA: 32,

    async verificarAutoConectar() {
        if (navigator.bluetooth && navigator.bluetooth.getDevices) {
            try {
                const devices = await navigator.bluetooth.getDevices();
                if (devices.length > 0) {
                    this.device = devices[0];
                    return await this.reconectar();
                }
            } catch (e) { console.error("Erro na auto-conexão:", e); }
        }
    },

    _iniciarKeepAlive() {
        this._pararKeepAlive();
        this._keepAliveTimer = setInterval(async () => {
            if (!this.char) { this._pararKeepAlive(); return; }
            try {
                await this.char.writeValueWithoutResponse(new Uint8Array([0x1B, 0x40]));
            } catch(e) {
                this.char = null;
                btSetStatus('erro', 'Impressora desconectada');
                this._pararKeepAlive();
            }
        }, 20000);
    },

    _pararKeepAlive() {
        if (this._keepAliveTimer) { clearInterval(this._keepAliveTimer); this._keepAliveTimer = null; }
    },

    async reconectar() {
        if (!this.device) return false;
        try {
            btSetStatus('aguardando', 'Reconectando...');
            const server   = await this.device.gatt.connect();
            const services = await server.getPrimaryServices();
            let charEncontrada = null;
            for (const svc of services) {
                const chars = await svc.getCharacteristics();
                for (const c of chars) {
                    if (c.properties.writeWithoutResponse || c.properties.write) { charEncontrada = c; break; }
                }
                if (charEncontrada) break;
            }
            if (!charEncontrada) throw new Error('Característica não encontrada.');
            this.char = charEncontrada;
            btSetStatus('conectado', `Conectado: ${this.device.name || 'Impressora BT'}`);
            this._iniciarKeepAlive();
            return true;
        } catch(e) { btSetStatus('erro', 'Falha ao reconectar: ' + e.message); return false; }
    },

    async conectar() {
        if (!navigator.bluetooth) {
            Swal.fire({ icon:'warning', title:'Bluetooth não suportado', text:'Use o Chrome no Android com Bluetooth ativado.', background:'#111', color:'#fff' });
            return false;
        }
        try {
            btSetStatus('aguardando', 'Buscando impressoras BT...');
            this.device = await navigator.bluetooth.requestDevice({
                acceptAllDevices: true,
                optionalServices: [
                    '000018f0-0000-1000-8000-00805f9b34fb',
                    '49535343-fe7d-4ae5-8fa9-9fafd205e455',
                    '0000ff00-0000-1000-8000-00805f9b34fb',
                    'e7810a71-73ae-499d-8c15-faa9aef0c3f2',
                ]
            });
            btSetStatus('aguardando', 'Conectando...');
            const server   = await this.device.gatt.connect();
            const services = await server.getPrimaryServices();
            let charEncontrada = null;
            for (const svc of services) {
                const chars = await svc.getCharacteristics();
                for (const c of chars) {
                    if (c.properties.writeWithoutResponse || c.properties.write) { charEncontrada = c; break; }
                }
                if (charEncontrada) break;
            }
            if (!charEncontrada) throw new Error('Característica de escrita não encontrada.');
            this.char = charEncontrada;
            this.device.addEventListener('gattserverdisconnected', async () => {
                this.char = null;
                this._pararKeepAlive();
                btSetStatus('aguardando', 'Desconectou — reconectando...');
                for (let t = 0; t < 3; t++) {
                    await new Promise(r => setTimeout(r, 1500));
                    const ok = await this.reconectar();
                    if (ok) return;
                }
                btSetStatus('erro', 'Impressora desconectada');
            });
            btSetStatus('conectado', `Conectado: ${this.device.name || 'Impressora BT'}`);
            this._iniciarKeepAlive();
            window.toast('Impressora conectada!');
            return true;
        } catch (e) {
            if (e.name !== 'NotFoundError') btSetStatus('erro', 'Falha: ' + e.message);
            else btSetStatus('', 'Nenhuma impressora selecionada');
            return false;
        }
    },

    async enviar(bytes) {
        if (!this.char) {
            if (this.device) { const ok = await this.reconectar(); if (!ok) return false; }
            else { const ok = await this.conectar(); if (!ok) return false; }
        }
        const CHUNK = 64;
        try {
            for (let i = 0; i < bytes.length; i += CHUNK) {
                const fatia = bytes.slice(i, i + CHUNK);
                if (this.char.properties.writeWithoutResponse) await this.char.writeValueWithoutResponse(fatia);
                else await this.char.writeValue(fatia);
                await new Promise(r => setTimeout(r, 50));
            }
            return true;
        } catch(e) {
            console.error("Erro GATT:", e);
            btSetStatus('erro', 'Erro na impressão: ' + e.message);
            this.char = null;
            return false;
        }
    }
};

function btSetStatus(estado, texto) {
    const dot  = document.getElementById('bt-dot');
    const span = document.getElementById('bt-texto');
    if (!dot || !span) return;
    dot.className = 'bt-status-dot' + (estado === 'conectado' ? ' conectado' : estado === 'erro' ? ' erro' : '');
    span.textContent = texto;
}

window.addEventListener('load', () => BT.verificarAutoConectar());
window.btConectar = () => BT.conectar();

function escPos() {
    const buf = [];
    const enc = new TextEncoder();
    const p   = (b) => buf.push(...(typeof b === 'string' ? enc.encode(limparEsc(b)) : b));
    const INIT=[0x1B,0x40],CENTRALIZAR=[0x1B,0x61,0x01],ESQUERDA=[0x1B,0x61,0x00],
          BOLD_ON=[0x1B,0x45,0x01],BOLD_OFF=[0x1B,0x45,0x00],
          DUPLO_ON=[0x1D,0x21,0x11],DUPLO_OFF=[0x1D,0x21,0x00],
          CORTAR=[0x1D,0x56,0x41,0x03],NOVA_LINHA=[0x0A];
    return {
        init()        { p(INIT); return this; },
        centro()      { p(CENTRALIZAR); return this; },
        esquerda()    { p(ESQUERDA); return this; },
        bold(on)      { p(on ? BOLD_ON : BOLD_OFF); return this; },
        duplo(on)     { p(on ? DUPLO_ON : DUPLO_OFF); return this; },
        linha(t='')   { p(t + '\n'); return this; },
        nl()          { p(NOVA_LINHA); return this; },
        separador(c='-'){ p(c.repeat(BT.LARGURA) + '\n'); return this; },
        cortar()      { p(CORTAR); return this; },
        bytes()       { return new Uint8Array(buf); }
    };
}

function limparEsc(t) {
    return String(t).normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^\x20-\x7E\n]/g,'');
}

function Fmt(v) {
    const n = typeof v === 'number' ? v : parseFloat(v) || 0;
    return 'R$' + n.toFixed(2).replace('.', ',');
}

function agora() {
    const d = new Date();
    return String(d.getDate()).padStart(2,'0') + '/' + String(d.getMonth()+1).padStart(2,'0') + '/' + d.getFullYear() + ' ' + String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
}

function linhaItem(nome, valor) {
    const valStr = Fmt(valor);
    const limiteNome = BT.LARGURA - valStr.length - 1;
    let nomeLimpo = limparEsc(nome).substring(0, limiteNome);
    const espacos = BT.LARGURA - nomeLimpo.length - valStr.length;
    return nomeLimpo + ' '.repeat(Math.max(1, espacos)) + valStr;
}

function gerarCupomDelivery(p) {
    const itens   = p.itens || [];
    const total   = typeof p.total === 'number' ? p.total : parseFloat(p.total) || 0;
    const bairro  = limparEsc(p.bairro || '');
    const taxa    = (p.taxaEntrega !== undefined) ? p.taxaEntrega : 0;
    const subtotal = total - taxa;

    const doc = escPos().init()
        .centro().duplo(true).bold(true).linha('ESPETO DO KAKA').duplo(false).bold(false)
        .linha('DELIVERY / BALCAO').separador('=').esquerda()
        .linha('DATA: ' + agora())
        .bold(true).linha('CLIENTE: ' + limparEsc(p.cliente || '').toUpperCase()).bold(false)
        .linha('END: ' + limparEsc(p.endereco || 'Retirada'));
    if (bairro) doc.linha('BAIRRO: ' + bairro);
    doc.linha('PAG: ' + limparEsc(p.pagamento || '')).separador('-')
        .bold(true).linha('ITENS DO PEDIDO:').bold(false).nl();
    itens.forEach(i => {
        const q = parseInt(i.qty) || 1;
        const vUnit = parseFloat(i.preco) || parseFloat(i.precoTotal) || 0;
        doc.linha(`${q}x ${limparEsc(i.nome)}`).linha(' '.repeat(17) + 'Sub: ' + Fmt(vUnit * q));
        if (i.obs) doc.linha('  >> ' + limparEsc(i.obs));
    });
    doc.separador('-');
    if (taxa > 0) { doc.linha(linhaItem('Subtotal', subtotal)).linha(linhaItem('Entrega', taxa)).separador('-'); }
    doc.bold(true).duplo(true).linha(linhaItem('TOTAL', total)).duplo(false).bold(false)
        .separador('=').nl().centro().linha('OBRIGADO PELA PREFERENCIA! VOLTE SEMPRE E QUE DEUS ABENÇOE.').nl().nl().cortar();
    return doc.bytes();
}

function gerarCupomMesa(m) {
    const itens = m.itens || [];
    const total = parseFloat(m.total) || itens.reduce((s,i) => s + (i.preco||0) * (i.qty||1), 0);
    const doc = escPos().init()
        .centro().duplo(true).bold(true).linha('MESA ' + m.numero).duplo(false).bold(false)
        .linha('CONTA FECHADA').separador('=').esquerda()
        .linha('ATENDENTE: ' + limparEsc(m.garcom || ''))
        .linha('PAG: '    + limparEsc(m.pagamento || ''))
        .linha('HORA: '   + agora()).separador('-')
        .bold(true).linha('ITENS:').bold(false).nl();
    itens.forEach(i => {
        const q    = parseInt(i.qty) || 1;
        const vUnit = parseFloat(i.preco) || 0;
        doc.linha(`${q}x ${limparEsc(i.nome)}`).linha(' '.repeat(17) + 'Sub: ' + Fmt(vUnit * q));
    });
    if (m.obs) doc.linha('OBS: ' + limparEsc(m.obs));
    doc.separador('-').bold(true).duplo(true).linha(linhaItem('TOTAL', total)).duplo(false).bold(false)
        .nl().centro().linha('OBRIGADO PELA PREFERENCIA! VOLTE SEMPRE E QUE DEUS ABENÇOE.').nl().nl().cortar();
    return doc.bytes();
}

window.imprimirDeliveryBT = async (dadosJson) => {
    try {
        const p = JSON.parse(dadosJson);
        const bytes = gerarCupomDelivery(p);
        const ok = await BT.enviar(bytes);
        if (ok) window.toast('Cupom impresso!');
    } catch (err) { console.error("Erro ao imprimir delivery:", err); }
};

window.imprimirMesaBT = async (dadosJson) => {
    try {
        const m = JSON.parse(dadosJson);
        const bytes = gerarCupomMesa(m);
        const ok = await BT.enviar(bytes);
        if (ok) window.toast('Cupom impresso!');
    } catch (err) { console.error("Erro ao imprimir mesa:", err); }
};

//som
let somAtivo = false;

window.toggleSom = () => {
    somAtivo = !somAtivo;
    document.getElementById('som-icon').className  = somAtivo ? 'fas fa-volume-up' : 'fas fa-volume-mute';
    document.getElementById('som-label').textContent = somAtivo ? 'SOM ON' : 'SOM';
    document.getElementById('btn-som').style.background = somAtivo ? 'rgba(232,169,48,0.15)' : 'none';
    if (somAtivo) {
        // Desbloqueia o áudio no mobile com interação do usuário
        const b = document.getElementById('bell');
        b.volume = 0; b.play().then(() => b.pause()).catch(()=>{});
        b.volume = 1;
    }
    window.toast(somAtivo ? '🔔 Som ativado!' : '🔕 Som desativado!');
};

window.tocarSino = () => {
    if (!somAtivo) return;
    const b = document.getElementById('bell');
    b.currentTime = 0;
    b.play().catch(e => console.warn('Áudio bloqueado:', e));
};

// ── OLHINHO NAS SENHAS DO SWAL ────────────────
document.addEventListener('keydown', () => {}, true);
document.addEventListener('swalOpened', () => {}, true);

const _swalOrig = Swal.fire.bind(Swal);
Swal.fire = function(opts, ...args) {
    if (opts && opts.input === 'password') {
        const _didOpen = opts.didOpen;
        opts.didOpen = (popup) => {
            if (_didOpen) _didOpen(popup);
            const inp = popup.querySelector('.swal2-input');
            if (!inp) return;
            inp.style.paddingRight = '44px';
            const btn = document.createElement('button');
            btn.type = 'button';
            btn.innerHTML = '<i class="fas fa-eye"></i>';
            btn.style.cssText = `
                position:absolute; right:60px; top:55%; transform:translateY(-50%);
                background:none; border:none; color:rgba(255,255,255,0.4);
                cursor:pointer; font-size:1rem; padding:4px; line-height:1;
                transition: color 0.2s;
            `;
            btn.onmouseenter = () => btn.style.color = 'var(--gold)';
            btn.onmouseleave = () => btn.style.color = 'rgba(255,255,255,0.4)';
            btn.onclick = () => {
                const visivel = inp.type === 'text';
                inp.type = visivel ? 'password' : 'text';
                btn.innerHTML = `<i class="fas fa-eye${visivel ? '' : '-slash'}"></i>`;
                inp.focus();
            };
            inp.parentElement.style.position = 'relative';
            inp.parentElement.appendChild(btn);
        };
    }
    return _swalOrig(opts, ...args);
};
